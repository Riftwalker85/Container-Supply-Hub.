<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Directory · Container Supply</title>
<link rel="icon" type="image/png" href="csc-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#122150; --royal:#2540bf; --royal-700:#1c33a0; --sky:#eaf0fb; --sky-line:#d8e2f6;
  --paper:#f4f7fc; --surface:#fff; --line:#dde4f1; --ink:#1b2333; --muted:#5a6479; --green:#2f8f5b;
  --shadow:0 1px 2px rgba(18,33,80,.05),0 8px 22px rgba(18,33,80,.06); --radius:11px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5}
.serif{font-family:'Source Serif 4',Georgia,serif}

header.topbar{background:var(--surface);border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(18,33,80,.04),0 6px 18px rgba(18,33,80,.04);position:sticky;top:0;z-index:50}
.topbar::before{content:'';display:block;height:4px;background:linear-gradient(90deg,var(--navy),var(--royal))}
.topbar-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:15px;flex:1 1 auto;min-width:230px}
.brand img.mark{height:46px;width:auto;display:block}
.brand .co{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.32rem;
  letter-spacing:.04em;text-transform:uppercase;color:var(--navy);line-height:1.05}
.brand .hub{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--royal);font-weight:600;margin-top:3px}
.search-wrap{position:relative;flex:0 1 320px;min-width:200px}
.search-wrap input{width:100%;padding:10px 14px 10px 40px;border-radius:9px;border:1px solid var(--line);
  background:var(--paper);font-family:inherit;font-size:.92rem;transition:.15s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{outline:none;border-color:var(--royal);background:#fff;box-shadow:0 0 0 3px rgba(37,64,191,.12)}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted)}

.subbar{max-width:1180px;margin:0 auto;padding:16px 28px 0;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.back{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--royal);font-weight:600;font-size:.9rem}
.back:hover{color:var(--royal-700)}
.count{font-size:.82rem;color:var(--muted)}

/* prominent search bar */
.search-hero{background:var(--surface);border-bottom:1px solid var(--line)}
.search-hero-inner{max-width:1180px;margin:0 auto;padding:16px 28px}
.big-search{position:relative;width:100%}
.big-search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--muted);pointer-events:none}
.big-search input{width:100%;padding:13px 16px 13px 46px;border-radius:11px;border:1px solid var(--line);
  background:var(--paper);font-family:inherit;font-size:1rem;color:var(--ink);transition:.15s}
.big-search input::placeholder{color:var(--muted)}
.big-search input:focus{outline:none;border-color:var(--royal);background:#fff;box-shadow:0 0 0 3px rgba(37,64,191,.12)}

main{max-width:1180px;margin:0 auto;padding:8px 28px 70px}
.section-head{display:flex;align-items:baseline;gap:14px;margin:26px 0 14px}
.section-head h2{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.4rem;color:var(--navy)}
.section-head .rule{flex:1;height:1px;background:var(--line)}

.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.contact{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 16px;display:flex;gap:13px;box-shadow:var(--shadow);transition:.15s}
.contact:hover{border-color:var(--sky-line);box-shadow:0 4px 14px rgba(18,33,80,.09)}
.avatar{width:42px;height:42px;flex:none;border-radius:50%;display:grid;place-items:center;
  font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:.95rem;color:#fff;background:var(--royal)}
.contact.shared .avatar{background:var(--navy);font-size:1.05rem}
.c-body{min-width:0;flex:1}
.c-name{font-weight:600;color:var(--navy);font-size:1.01rem;line-height:1.2;margin-bottom:5px}
.c-line{display:flex;align-items:center;gap:7px;font-size:.85rem;margin-top:2px}
.c-line svg{width:13px;height:13px;flex:none;stroke:var(--muted);fill:none;stroke-width:1.8}
.c-line a{color:var(--royal);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-line a:hover{text-decoration:underline}
.c-line.phone a{color:var(--ink)}

.no-results{display:none;text-align:center;color:var(--muted);padding:50px 0}
.no-results.show{display:block}

footer{background:var(--navy);color:rgba(255,255,255,.72)}
.footer-inner{max-width:1180px;margin:0 auto;padding:22px 28px;font-size:.78rem;letter-spacing:.03em;
  display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
.footer-inner a{color:#fff}

@media(max-width:560px){.search-wrap{flex-basis:100%}}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img class="mark" src="csc-mark.png" alt="Container Supply logo">
      <div><div class="co">Container Supply</div><div class="hub">Staff Directory</div></div>
    </div>
  </div>
</header>

<section class="search-hero">
  <div class="search-hero-inner">
    <div class="big-search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search name, email, or phone…" autocomplete="off">
    </div>
  </div>
</section>

<div class="subbar">
  <!-- If your homepage file is not named index.html, change this href to match. -->
  <a class="back" href="index.html">&larr; Back to Info Hub</a>
  <span class="count" id="count"></span>
</div>

<main>
  <div class="section-head"><h2 class="serif">People</h2><span class="rule"></span></div>
  <div class="dir-grid" id="people-mount"></div>

  <div class="section-head"><h2 class="serif">Departments &amp; Shared Mailboxes</h2><span class="rule"></span></div>
  <div class="dir-grid" id="shared-mount"></div>

  <div class="no-results" id="no-results">No matches found.</div>
</main>

<footer>
  <div class="footer-inner">
    <div>Container Supply Co. &bull; Internal Staff Directory</div>
    <div>Garden Grove, CA &bull; <a href="tel:714-892-8321">714-892-8321</a></div>
  </div>
</footer>

"jmagdaleno@cscmfg.com"], "phones": [{"display": "(714) 587-0606", "tel": "7145870606"}], "type": "person"}, {"name": "Carlos Manzanares", "initials": "CM", "emails": ["cmanzanares@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Michael Marrujo", "initials": "MM", "emails": ["mmarrujo@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Robert Marrujo", "initials": "RM", "emails": ["Rmarrujo@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Harry Mermeryan", "initials": "HM", "emails": ["hmermeryan@cscmfg.com", "harry@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Joel Molina", "initials": "JM", "emails": ["jmolina@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Arnel Nagel", "initials": "AN", "emails": ["anagel@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Edward Nahabedian", "initials": "EN", "emails": ["enahabedian@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Oscar Ortiz", "initials": "OO", "emails": ["oortiz@cscmfg.com"], "phones": [{"display": "(714) 209-9017", "tel": "7142099017"}, {"display": "(714) 713-6550", "tel": "7147136550"}], "type": "person"}, {"name": "Robert Pulido", "initials": "RP", "emails": ["rpulido@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Art Ramos", "initials": "AR", "emails": ["aramos@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Joe Rider", "initials": "JR", "emails": ["jrider@cscmfg.com"], "phones": [{"display": "(714) 863-4711", "tel": "7148634711"}], "type": "person"}, {"name": "Veronica Rivera", "initials": "VR", "emails": ["vrivera@cscmfg.com"], "phones": [{"display": "+17143187350", "tel": "+17143187350"}], "type": "person"}, {"name": "Joe Ruffino", "initials": "JR", "emails": ["jruffino@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Steve Saludes", "initials": "SS", "emails": ["ssaludes@cscmfg.com"], "phones": [{"display": "(714) 264-1211", "tel": "7142641211"}], "type": "person"}, {"name": "Edwin Steen", "initials": "ES", "emails": ["esteen@cscmfg.com"], "phones": [{"display": "1(714)8656032", "tel": "17148656032"}], "type": "person"}, {"name": "Ron Taylor", "initials": "RT", "emails": ["rtaylor@cscmfg.com"], "phones": [], "type": "person"}, {"name": "tbertoglio", "initials": "TB", "emails": ["tbertoglio@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Sherri Terrones", "initials": "ST", "emails": ["sterrones@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Leon Tucker", "initials": "LT", "emails": ["ltucker@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Donald Ware", "initials": "DW", "emails": ["dware@cscmfg.com"], "phones": [], "type": "person"}, {"name": "Mike Williams", "initials": "MW", "emails": ["mwilliams@cscmfg.com"], "phones": [], "type": "person"}, {"name": "George Zubia", "initials": "GZ", "emails": ["gzubia@cscmfg.com"], "phones": [{"display": "15626394740", "tel": "15626394740"}, {"display": "17146226449", "tel": "17146226449"}], "type": "person"}, {"name": "Isabel Zuniga", "initials": "IZ", "emails": ["izuniga@cscmfg.com"], "phones": [{"display": "+1 562-274-1121", "tel": "+15622741121"}, {"display": "+16577963593", "tel": "+16577963593"}], "type": "person"}];
const SHARED = [{"name": "Accounting", "emails": ["accounting@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Admin / Office", "emails": ["admin@cscmfg.com", "office1@cscmfg.com", "litho365@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "AL — CWS", "emails": ["alcws@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Art Department", "emails": ["kcpe@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Copiers", "emails": ["copier@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Customer Art", "emails": ["customerart@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "CWS", "emails": ["cws@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "FG — CWS", "emails": ["fgcws@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "General Account", "emails": ["csc@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Human Resources", "emails": ["hr@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "JN — CWS", "emails": ["jncws@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "MC — CWS", "emails": ["mccws@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Orders", "emails": ["cscorders@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Oxidizer", "emails": ["oxidizer@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Phone System", "emails": ["phonesystem@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Production Central", "emails": ["productioncentral@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "QC Lab", "emails": ["cscqclab@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "QC Lab 2", "emails": ["cscqclab2@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Sales", "emails": ["sales@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "System Alerts", "emails": ["alerts@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Training", "emails": ["training@cscmfg.com"], "phones": [], "type": "shared"}, {"name": "Workers Comp", "emails": ["workerscomp@cscmfg.com"], "phones": [], "type": "shared"}];

const ICON_MAIL = '<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>';
const ICON_PHONE = '<svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"/></svg>';

const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function card(c){
  const emails = c.emails.map(e =>
    `<div class="c-line">${ICON_MAIL}<a href="mailto:${esc(e)}">${esc(e)}</a></div>`).join('');
  const phones = (c.phones||[]).map(p =>
    `<div class="c-line phone">${ICON_PHONE}<a href="tel:${esc(p.tel)}">${esc(p.display)}</a></div>`).join('');
  const avatar = c.type === 'shared' ? '&#9993;' : esc(c.initials || '?');
  const hay = (c.name + ' ' + c.emails.join(' ') + ' ' + (c.phones||[]).map(p=>p.display).join(' ')).toLowerCase();
  return `<div class="contact ${c.type}" data-search="${esc(hay)}">
            <div class="avatar">${avatar}</div>
            <div class="c-body"><div class="c-name">${esc(c.name)}</div>${emails}${phones}</div>
          </div>`;
}

document.getElementById('people-mount').innerHTML = PEOPLE.map(card).join('');
document.getElementById('shared-mount').innerHTML = SHARED.map(card).join('');
document.getElementById('count').textContent = PEOPLE.length + ' people · ' + SHARED.length + ' shared mailboxes';

const input = document.getElementById('search');
const noRes = document.getElementById('no-results');
input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  let visible = 0;
  document.querySelectorAll('.contact').forEach(el => {
    const hit = !q || el.dataset.search.includes(q);
    el.style.display = hit ? '' : 'none';
    if (hit) visible++;
  });
  document.querySelectorAll('.section-head').forEach(h => {
    const grid = h.nextElementSibling;
    const any = [...grid.querySelectorAll('.contact')].some(e => e.style.display !== 'none');
    h.style.display = any ? '' : 'none';
    grid.style.display = any ? '' : 'none';
  });
  noRes.classList.toggle('show', q && visible === 0);
});
