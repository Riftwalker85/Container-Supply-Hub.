<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Supply — Training Portal</title>
<link rel="icon" type="image/png" href="csc-mark.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===============================================================
   THEME TOKENS — matched to the Container Supply Info Hub.
   =============================================================== */
:root{
  --navy:#122150; --navy-700:#1b2f6b;
  --royal:#2540bf; --royal-700:#1c33a0;
  --sky:#eaf0fb; --sky-line:#d8e2f6;
  --paper:#f4f7fc; --surface:#ffffff;
  --line:#dde4f1; --ink:#1b2333; --muted:#5a6479;
  --green:#2f8f5b; --green-bg:#e7f5ee;
  --amber:#b6791f; --amber-bg:#fbf1de;
  --red:#c0392b; --red-bg:#fbe9e7;
  --shadow:0 1px 2px rgba(18,33,80,.05), 0 8px 22px rgba(18,33,80,.06);
  --radius:11px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5}
.serif{font-family:'Source Serif 4',Georgia,serif}
a{color:var(--royal)}

/* ── top bar ── */
header.topbar{background:var(--surface);border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(18,33,80,.04),0 6px 18px rgba(18,33,80,.04);position:sticky;top:0;z-index:50}
.topbar::before{content:'';display:block;height:4px;background:linear-gradient(90deg,var(--navy),var(--royal))}
.topbar-inner{max-width:1240px;margin:0 auto;padding:13px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px;flex:1 1 auto;min-width:220px}
.brand img.mark{height:42px;width:auto;display:block}
.brand .wordmark .co{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.22rem;
  letter-spacing:.04em;text-transform:uppercase;color:var(--navy);line-height:1.05}
.brand .wordmark .hub{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--royal);font-weight:600;margin-top:3px}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.who{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted);
  background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 13px}
.who b{color:var(--navy);font-weight:600}
.who button{border:none;background:none;color:var(--royal);font:inherit;font-size:.78rem;cursor:pointer;padding:0;font-weight:600}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--navy);
  border:1px solid var(--line);border-radius:8px;padding:7px 13px;font-size:.85rem;font-weight:600;background:var(--surface)}
.btn-ghost:hover{border-color:var(--royal);color:var(--royal)}

/* ── tabs ── */
.tabbar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:59px;z-index:40}
.tabbar-inner{max-width:1240px;margin:0 auto;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
.tab{appearance:none;border:none;background:none;font:inherit;cursor:pointer;white-space:nowrap;
  padding:14px 16px;font-size:.92rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--navy)}
.tab[aria-selected="true"]{color:var(--royal);border-bottom-color:var(--royal)}
.tab .cnt{font-size:.7rem;background:var(--sky);color:var(--royal);border-radius:999px;padding:1px 8px;margin-left:6px;font-weight:700}

/* ── layout ── */
main{max-width:1240px;margin:0 auto;padding:28px 28px 72px}
.view{display:none}.view.active{display:block}
.view-head{margin-bottom:18px}
.view-head h1{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.7rem;color:var(--navy);letter-spacing:.005em}
.view-head p{color:var(--muted);font-size:.95rem;margin-top:4px;max-width:70ch}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0 18px}
.field{position:relative}
.field input,.field select{font:inherit;font-size:.9rem;padding:9px 13px;border:1px solid var(--line);
  border-radius:8px;background:var(--surface);color:var(--ink);min-width:200px}
.field input:focus,.field select:focus{outline:none;border-color:var(--royal);box-shadow:0 0 0 3px rgba(37,64,191,.12)}
.spacer{flex:1}

/* ── matrix table ── */
.tbl-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto}
table.matrix{border-collapse:collapse;width:100%;font-size:.9rem;min-width:680px}
table.matrix th,table.matrix td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}
table.matrix thead th{background:var(--navy);color:#fff;font-weight:600;font-size:.82rem;letter-spacing:.02em;
  position:sticky;top:0;text-align:center}
table.matrix thead th:first-child{text-align:left}
table.matrix tbody tr:last-child td{border-bottom:none}
table.matrix tbody tr:hover{background:var(--sky)}
.t-name{font-weight:600;color:var(--navy)}
.t-sub{display:block;font-weight:400;color:var(--muted);font-size:.78rem;margin-top:2px}
.cell-req{text-align:center}
.req-dot{display:inline-block;width:20px;height:20px;line-height:20px;border-radius:50%;
  background:var(--royal);color:#fff;font-size:.7rem;text-align:center;font-weight:700}
.req-no{color:var(--line);font-weight:700}
.chip{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:999px;text-transform:uppercase}
.chip-cat{background:var(--sky);color:var(--royal-700)}
.chip-rec{background:var(--paper);color:var(--muted);border:1px solid var(--line)}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:.82rem;color:var(--muted);align-items:center}
.legend .req-dot{margin-right:6px}

/* ── status table ── */
.status-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
.s-current{background:var(--green-bg);color:var(--green)}
.s-due{background:var(--amber-bg);color:var(--amber)}
.s-missing{background:var(--red-bg);color:var(--red)}

/* ── catalog cards ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  display:flex;flex-direction:column;border-top:3px solid var(--royal);overflow:hidden}
.tcard .body{padding:18px 20px 16px;flex:1;display:flex;flex-direction:column;gap:9px}
.tcard h3{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:1.2rem;color:var(--navy);line-height:1.18}
.tcard .meta{display:flex;gap:8px;flex-wrap:wrap}
.tcard p{font-size:.88rem;color:var(--muted);flex:1}
.tcard .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:13px 20px;border-top:1px solid var(--line);background:var(--paper)}
.tcard .qn{font-size:.78rem;color:var(--muted)}
.btn{appearance:none;border:none;cursor:pointer;font:inherit;font-weight:600;font-size:.9rem;border-radius:9px;
  padding:10px 18px;background:var(--royal);color:#fff;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--royal-700)}
.btn.sm{padding:8px 14px;font-size:.85rem}
.btn.secondary{background:var(--surface);color:var(--navy);border:1px solid var(--line)}
.btn.secondary:hover{border-color:var(--royal);color:var(--royal);background:var(--surface)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── training detail / quiz ── */
.detail-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.detail-head{padding:20px 24px;border-bottom:1px solid var(--line)}
.detail-head h2{font-family:'Source Serif 4',Georgia,serif;color:var(--navy);font-size:1.5rem}
.detail-head .meta{margin-top:8px}
.video-wrap{aspect-ratio:16/9;background:var(--navy);display:grid;place-items:center}
.video-wrap iframe{width:100%;height:100%;border:0;display:block}
.video-ph{color:#cfe0ea;text-align:center;padding:30px;font-size:.95rem}
.video-ph b{display:block;color:#fff;font-size:1.05rem;margin-bottom:6px;font-family:'Source Serif 4',serif}
.detail-body{padding:22px 24px}
.detail-body .lead{color:var(--ink);margin-bottom:6px}
.quiz-intro{background:var(--sky);border:1px solid var(--sky-line);border-radius:var(--radius);padding:16px 20px;margin:18px 0;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.quiz-intro .txt{flex:1;min-width:200px}
.quiz-intro h4{color:var(--navy);font-family:'Source Serif 4',serif;font-size:1.12rem}
.quiz-intro p{font-size:.86rem;color:var(--muted)}

.q-block{padding:18px 0;border-bottom:1px solid var(--line)}
.q-block:last-child{border-bottom:none}
.q-num{font-size:.74rem;font-weight:700;color:var(--royal);letter-spacing:.06em;text-transform:uppercase}
.q-text{font-weight:600;color:var(--navy);margin:5px 0 12px;font-size:1.02rem}
.opt{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border:1px solid var(--line);border-radius:9px;
  margin-bottom:9px;cursor:pointer;transition:.12s;background:var(--surface)}
.opt:hover{border-color:var(--royal);background:var(--sky)}
.opt input{margin-top:3px;accent-color:var(--royal);width:16px;height:16px;flex:none}
.opt.correct{border-color:var(--green);background:var(--green-bg)}
.opt.wrong{border-color:var(--red);background:var(--red-bg)}
.opt .mark{margin-left:auto;font-weight:700;font-size:.82rem}
.opt.correct .mark{color:var(--green)}
.opt.wrong .mark{color:var(--red)}
.quiz-actions{display:flex;align-items:center;gap:14px;margin-top:20px;flex-wrap:wrap}
.warn{color:var(--red);font-size:.85rem;font-weight:600}

/* ── result ── */
.result{text-align:center;padding:34px 24px}
.result .ring{width:128px;height:128px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px;
  font-family:'Source Serif 4',serif;font-weight:700;font-size:2.3rem;color:#fff}
.result.pass .ring{background:var(--green)}
.result.fail .ring{background:var(--red)}
.result h2{font-family:'Source Serif 4',serif;color:var(--navy);font-size:1.7rem}
.result .sub{color:var(--muted);margin:6px 0 4px}
.result .logged{font-size:.82rem;color:var(--green);font-weight:600;margin-top:10px}
.result .logged.local{color:var(--amber)}

/* ── records ── */
table.records{border-collapse:collapse;width:100%;font-size:.86rem;min-width:760px}
table.records th,table.records td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
table.records thead th{background:var(--paper);color:var(--navy);font-weight:600;position:sticky;top:0;
  border-bottom:2px solid var(--line);font-size:.78rem;letter-spacing:.03em;text-transform:uppercase}
table.records tbody tr:hover{background:var(--sky)}
.res-pass{color:var(--green);font-weight:700}
.res-fail{color:var(--red);font-weight:700}
.muted-note{color:var(--muted);font-size:.85rem}
.empty{text-align:center;color:var(--muted);padding:48px 20px;background:var(--surface);
  border:1px dashed var(--line);border-radius:var(--radius)}
.empty b{color:var(--navy);display:block;margin-bottom:4px;font-family:'Source Serif 4',serif;font-size:1.05rem}

/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(18,33,80,.45);display:none;place-items:center;z-index:100;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--surface);border-radius:14px;max-width:420px;width:100%;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(18,33,80,.3)}
.modal h3{font-family:'Source Serif 4',serif;color:var(--navy);font-size:1.3rem;margin-bottom:4px}
.modal p{color:var(--muted);font-size:.88rem;margin-bottom:16px}
.modal label{display:block;font-size:.82rem;font-weight:600;color:var(--navy);margin:12px 0 5px}
.modal input{width:100%;font:inherit;padding:10px 13px;border:1px solid var(--line);border-radius:8px}
.modal input:focus{outline:none;border-color:var(--royal);box-shadow:0 0 0 3px rgba(37,64,191,.12)}
.modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── footer ── */
footer{background:var(--navy);color:rgba(255,255,255,.72)}
.footer-inner{max-width:1240px;margin:0 auto;padding:22px 28px;display:flex;justify-content:space-between;
  align-items:center;gap:16px;flex-wrap:wrap;font-size:.78rem;letter-spacing:.03em}
.footer-inner a{color:#fff}
.footer-brand{display:flex;align-items:center;gap:10px}
.footer-brand img{height:28px;opacity:.95}
.footer-brand .ftxt{font-family:'Source Serif 4',serif;text-transform:uppercase;color:#fff;font-weight:600;font-size:.8rem;letter-spacing:.05em}

@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.reveal{animation:rise .4s ease both}
@media(max-width:560px){
  .topbar-inner,.tabbar-inner,main,.footer-inner{padding-left:16px;padding-right:16px}
  .who{display:none}
}
@media(prefers-reduced-motion:reduce){.reveal{animation:none}}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img class="mark" src="csc-mark.png" alt="Container Supply" onerror="this.style.display='none'">
      <div class="wordmark">
        <div class="co">Container Supply</div>
        <div class="hub">Training Portal</div>
      </div>
    </div>
    <div class="topbar-actions">
      <span class="who" id="who"></span>
      <a class="btn-ghost" href="index.html">← Back to Hub</a>
    </div>
  </div>
</header>

<nav class="tabbar">
  <div class="tabbar-inner" id="tabs" role="tablist"></div>
</nav>

<main>
  <section class="view active" id="view-matrix"></section>
  <section class="view" id="view-status"></section>
  <section class="view" id="view-trainings"></section>
  <section class="view" id="view-detail"></section>
  <section class="view" id="view-records"></section>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="csc-mark-white.png" alt="Container Supply" onerror="this.style.display='none'">
      <span class="ftxt">Container Supply Co.</span>
    </div>
    <div>Internal use only • Garden Grove, CA • Training records retained per SQF requirements</div>
  </div>
</footer>

<!-- identity modal -->
<div class="modal-bg" id="id-modal">
  <div class="modal">
    <h3>Before you begin</h3>
    <p>Enter your name so your test attempts are recorded under the right person.</p>
    <label for="id-name">Full name</label>
    <input id="id-name" type="text" placeholder="e.g., Jordan Rivera" autocomplete="name">
    <label for="id-num">Employee ID <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
    <input id="id-num" type="text" placeholder="e.g., 1042" autocomplete="off">
    <div class="row">
      <button class="btn secondary" id="id-cancel">Cancel</button>
      <button class="btn" id="id-save">Save &amp; continue</button>
    </div>
  </div>
</div>

<script>
/* ===================================================================
   ███  EDIT EVERYTHING IN CONFIG — THIS IS THE PART YOU MANAGE  ███
   -------------------------------------------------------------------
   ADD A TRAINING: copy one { ... } block in `trainings` and edit it.
     id            a short unique slug (letters/numbers/dashes), e.g. 'gmp-basics'
     title         the training name
     category      grouping label shown as a chip
     required      array of roles that must complete it (must match names in `roles`)
     recurrence    'Once' | 'Monthly' | 'Quarterly' | 'Annual' | 'Biennial'
     passingScore  percent needed to pass (e.g., 80)
     video         an EMBED url (YouTube 'embed' link or Google Drive 'preview' link). Leave '' until you have it.
     description   one or two sentences
     questions     list of { q, options:[...], answer: <index of correct option, 0-based> }

   ADD A ROLE: add it to `roles` (it becomes a new matrix column automatically).
   ADD AN EMPLOYEE (optional, powers the Completion Status tab):
     add to `employees`: { name:'…', id:'…', role:'<one of roles>' }

   RECORDS: every test attempt is saved. To keep central records that all
   computers share, deploy the companion Apps Script (see the .gs file) and
   paste its /exec web-app URL into records.endpoint below. If left blank, the
   portal still works but saves attempts only in the current browser.
   =================================================================== */

const CONFIG = {

  records: {
    endpoint: '',          // <-- paste your Apps Script /exec URL here (see training-portal-apps-script.gs)
    defaultPassingScore: 80 // % needed to pass when a training doesn't set its own
  },

  roles: ['Production','Maintenance','Warehouse','Receiving','Planning','Quality','Office'],

  // Optional roster — powers the "Completion Status" tab. Replace the samples with real staff (or clear it).
  employees: [
    { name:'Sample Operator', id:'1001', role:'Production' },
    { name:'Sample Technician', id:'1002', role:'Maintenance' },
    { name:'Sample Clerk', id:'1003', role:'Receiving' }
  ],

  trainings: [
    {
      id:'gmp-basics',
      title:'GMP Basics for Food-Contact Packaging',
      category:'Quality & Food Safety',
      required:['Production','Maintenance','Warehouse','Receiving','Quality'],
      recurrence:'Annual',
      passingScore:80,
      video:'',  // e.g. 'https://www.youtube.com/embed/XXXXXXXXXXX'
      description:'Core Good Manufacturing Practices that keep our cans and containers safe for food contact: hygiene, foreign-material control, and personal conduct on the floor.',
      questions:[
        { q:'What is the main purpose of Good Manufacturing Practices (GMPs) at CSC?',
          options:['To speed up the production line','To keep our packaging safe and free of contamination','To reduce electricity use','To schedule maintenance'],
          answer:1 },
        { q:'Where should personal items such as food and drinks be kept?',
          options:['On the production line for convenience','In designated break areas only','Anywhere away from machinery','In your pocket'],
          answer:1 },
        { q:'You notice a piece of plastic strapping on the floor near the line. You should:',
          options:['Leave it; housekeeping will get it','Remove it right away and report if needed','Kick it under the machine','Wait until the end of your shift'],
          answer:1 },
        { q:'Which of these is a foreign-material control practice?',
          options:['Wearing loose jewelry','Using glass containers near the line','Following the tool-control and no-glass policies','Skipping hand washing to save time'],
          answer:2 },
        { q:'If you are sick with a contagious illness, you should:',
          options:['Come in anyway to avoid falling behind','Notify your supervisor before handling product','Wear two pairs of gloves','Work only the night shift'],
          answer:1 }
      ]
    },
    {
      id:'hazcom-ghs',
      title:'Hazard Communication & GHS Labels',
      category:'Safety & Compliance',
      required:['Production','Maintenance','Warehouse','Receiving','Planning','Quality','Office'],
      recurrence:'Annual',
      passingScore:80,
      video:'',
      description:'How to read GHS labels and Safety Data Sheets, what the pictograms mean, and where to find chemical safety information at CSC.',
      questions:[
        { q:'A Safety Data Sheet (SDS) tells you:',
          options:['The price of a chemical','How to handle, store, and respond to a chemical safely','Who ordered the chemical','The delivery schedule'],
          answer:1 },
        { q:'A GHS pictogram showing a flame means the product is:',
          options:['Corrosive','Flammable','Heavy','Expired'],
          answer:1 },
        { q:'Where can you find the SDS for a chemical you are using?',
          options:['Only at the supplier','Through the SDS Lookup link on the Info Hub','You cannot access them','In the break room fridge'],
          answer:1 },
        { q:'A secondary container you pour a chemical into must be:',
          options:['Left unlabeled','Labeled with the product name and hazard information','Hidden from view','Used only once'],
          answer:1 }
      ]
    }
  ]
};

/* ===================================================================
   ███  ENGINE — no need to edit below this line  ███
   =================================================================== */
(function(){
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const $ = id => document.getElementById(id);
  const PASS_DEFAULT = CONFIG.records.defaultPassingScore || 80;

  /* ---- identity (stored locally for convenience) ---- */
  const ID_KEY = 'csc_tp_identity';
  function getIdentity(){ try{ return JSON.parse(localStorage.getItem(ID_KEY)||'null'); }catch(_){ return null; } }
  function setIdentity(o){ try{ localStorage.setItem(ID_KEY, JSON.stringify(o)); }catch(_){} renderWho(); }
  function renderWho(){
    const u = getIdentity();
    $('who').innerHTML = u
      ? `Signed in as <b>${esc(u.name)}</b>${u.id?` (#${esc(u.id)})`:''} &nbsp;<button id="who-change">Change</button>`
      : `<button id="who-change">Set your name</button>`;
    const b = $('who-change'); if(b) b.onclick = ()=>openIdModal();
  }
  let idCallback = null;
  function openIdModal(cb){
    idCallback = cb || null;
    const u = getIdentity();
    $('id-name').value = u ? u.name : '';
    $('id-num').value  = u ? (u.id||'') : '';
    $('id-modal').classList.add('show');
    $('id-name').focus();
  }
  function closeIdModal(){ $('id-modal').classList.remove('show'); idCallback = null; }
  $('id-save').onclick = ()=>{
    const name = $('id-name').value.trim();
    if(!name){ $('id-name').focus(); return; }
    setIdentity({ name, id:$('id-num').value.trim() });
    const cb = idCallback; closeIdModal();
    if(cb) cb();
  };
  $('id-cancel').onclick = closeIdModal;
  $('id-modal').addEventListener('click', e=>{ if(e.target===$('id-modal')) closeIdModal(); });

  /* ---- local attempt store (always kept; sole store if no endpoint) ---- */
  const ATT_KEY = 'csc_tp_attempts';
  function localAttempts(){ try{ return JSON.parse(localStorage.getItem(ATT_KEY)||'[]'); }catch(_){ return []; } }
  function pushLocal(rec){ const a = localAttempts(); a.push(rec); try{ localStorage.setItem(ATT_KEY, JSON.stringify(a)); }catch(_){} }

  /* ---- JSONP helper (works cross-origin from GitHub Pages) ---- */
  let jpN = 0;
  function jsonp(baseUrl, cb){
    const name = '__csc_tp_cb_' + (jpN++);
    const sep = baseUrl.indexOf('?')>=0 ? '&' : '?';
    const s = document.createElement('script');
    let done = false;
    const finish = (data, err)=>{ if(done) return; done = true;
      try{ delete window[name]; }catch(_){ window[name]=undefined; }
      s.remove(); cb(data, err); };
    window[name] = data => finish(data, null);
    s.onerror = ()=> finish(null, 'network');
    s.src = baseUrl + sep + 'callback=' + name;
    document.body.appendChild(s);
    setTimeout(()=>finish(null,'timeout'), 12000);
  }

  /* ---- log an attempt: local always + backend when configured ---- */
  function logAttempt(rec, cb){
    pushLocal(rec);
    const ep = (CONFIG.records.endpoint||'').trim();
    if(!ep){ cb && cb({ ok:true, local:true }); return; }
    const p = new URLSearchParams({
      action:'log', name:rec.name, id:rec.id||'', trainingId:rec.trainingId,
      title:rec.title, correct:rec.correct, total:rec.total, percent:rec.percent,
      result:rec.result, answers:rec.answers, ua:(navigator.userAgent||'').slice(0,120)
    });
    jsonp(ep + '?' + p.toString(), (data, err)=>{
      cb && cb(err ? { ok:false, local:true, error:err } : (data||{ ok:true }));
    });
  }

  /* ---- fetch records: backend when configured, else local ---- */
  function fetchRecords(cb){
    const ep = (CONFIG.records.endpoint||'').trim();
    if(!ep){
      const recs = localAttempts().slice().reverse().map(r=>({
        Timestamp:r.ts, Name:r.name, 'Employee ID':r.id, 'Training':r.title,
        Percent:r.percent, Result:r.result, Score:r.correct, Total:r.total, _local:true
      }));
      cb(recs, { local:true }); return;
    }
    jsonp(ep + '?action=records', (data, err)=>{
      if(err || !data || !data.ok){ 
        // fall back to local on error so the page still shows something
        const recs = localAttempts().slice().reverse().map(r=>({
          Timestamp:r.ts, Name:r.name, 'Employee ID':r.id, 'Training':r.title,
          Percent:r.percent, Result:r.result, Score:r.correct, Total:r.total, _local:true
        }));
        cb(recs, { local:true, error:err||'load failed' });
      } else {
        cb(data.records||[], { local:false });
      }
    });
  }

  /* ---- recurrence helpers ---- */
  function recurrenceDays(r){
    return ({Once:Infinity, Monthly:30, Quarterly:91, Annual:365, Biennial:730})[r] ?? 365;
  }
  function trainingById(id){ return CONFIG.trainings.find(t=>t.id===id); }
  function passScore(t){ return t.passingScore || PASS_DEFAULT; }

  /* =====================  VIEWS  ===================== */
  const VIEWS = [
    { id:'matrix',    label:'Training Matrix' },
    { id:'status',    label:'Completion Status' },
    { id:'trainings', label:'Trainings', count:()=>CONFIG.trainings.length },
    { id:'records',   label:'Records' }
  ];
  function buildTabs(){
    $('tabs').innerHTML = VIEWS.map(v=>
      `<button class="tab" role="tab" data-view="${v.id}" aria-selected="${v.id==='matrix'}">
         ${esc(v.label)}${v.count?`<span class="cnt">${v.count()}</span>`:''}
       </button>`).join('');
    $('tabs').querySelectorAll('.tab').forEach(b=> b.onclick = ()=>setView(b.dataset.view));
  }
  function setView(name){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $('view-'+name).classList.add('active');
    $('tabs').querySelectorAll('.tab').forEach(b=> b.setAttribute('aria-selected', b.dataset.view===name));
    window.scrollTo({top:0, behavior:'smooth'});
    if(name==='matrix')   renderMatrix();
    if(name==='status')   renderStatus();
    if(name==='trainings')renderCatalog();
    if(name==='records')  renderRecords();
  }

  /* ---- Matrix: trainings (rows) × roles (cols) ---- */
  function renderMatrix(){
    const roles = CONFIG.roles;
    const rows = CONFIG.trainings.map(t=>{
      const cells = roles.map(r=>{
        const req = (t.required||[]).includes(r);
        return `<td class="cell-req">${req?'<span class="req-dot" title="Required">✓</span>':'<span class="req-no">·</span>'}</td>`;
      }).join('');
      return `<tr>
        <td><span class="t-name">${esc(t.title)}</span>
            <span class="t-sub"><span class="chip chip-cat">${esc(t.category)}</span>
            <span class="chip chip-rec">${esc(t.recurrence)}</span></span></td>
        ${cells}</tr>`;
    }).join('');
    $('view-matrix').innerHTML = `
      <div class="view-head">
        <h1 class="serif">Training Matrix</h1>
        <p>Which trainings are required for each role, and how often they repeat. Add a training in the file's CONFIG and a new row appears here automatically; add a role and a new column appears.</p>
      </div>
      <div class="tbl-wrap">
        <table class="matrix">
          <thead><tr><th>Training</th>${roles.map(r=>`<th>${esc(r)}</th>`).join('')}</tr></thead>
          <tbody>${rows||`<tr><td colspan="${roles.length+1}">No trainings defined yet.</td></tr>`}</tbody>
        </table>
      </div>
      <div class="legend"><span><span class="req-dot">✓</span>Required for this role</span>
        <span><span class="chip chip-cat">Category</span></span>
        <span><span class="chip chip-rec">How often it repeats</span></span></div>`;
  }

  /* ---- Completion Status: employees × required trainings (uses records) ---- */
  function latestPass(records, name, trainingId){
    let best = null;
    records.forEach(r=>{
      const rn = (r.Name||'').toLowerCase().trim();
      const rt = (r['Training ID']||r.trainingId||'');
      const result = (r.Result||'').toLowerCase();
      if(rn===name.toLowerCase().trim() && rt===trainingId && result==='pass'){
        const ts = new Date(r.Timestamp||r.ts||0).getTime();
        if(!best || ts>best) best = ts;
      }
    });
    return best;
  }
  function renderStatus(){
    const head = `
      <div class="view-head">
        <h1 class="serif">Completion Status</h1>
        <p>Each employee's standing on the trainings their role requires, based on recorded test passes. <span class="muted-note">Current = passed within the repeat window · Due = passed but expired · Missing = no passing attempt on record.</span></p>
      </div>`;
    if(!CONFIG.employees || !CONFIG.employees.length){
      $('view-status').innerHTML = head + `<div class="empty"><b>No roster yet</b>Add staff to the <code>employees</code> list in CONFIG to track who is current, due, or missing each required training.</div>`;
      return;
    }
    $('view-status').innerHTML = head + `<div class="muted-note" id="status-loading">Loading records…</div>`;
    fetchRecords((records, info)=>{
      const now = Date.now();
      const rows = CONFIG.employees.map(emp=>{
        const reqd = CONFIG.trainings.filter(t=>(t.required||[]).includes(emp.role));
        const cells = reqd.map(t=>{
          const lp = latestPass(records, emp.name, t.id);
          let cls='s-missing', txt='Missing';
          if(lp){
            const days = (now-lp)/86400000;
            if(days <= recurrenceDays(t.recurrence)){ cls='s-current'; txt='Current'; }
            else { cls='s-due'; txt='Due'; }
          }
          return `<td><span class="status-tag ${cls}" title="${esc(t.title)}">${txt}</span></td>`;
        }).join('');
        return `<tr><td><span class="t-name">${esc(emp.name)}</span>
                  <span class="t-sub">${esc(emp.role)}${emp.id?` · #${esc(emp.id)}`:''}</span></td>
                ${cells || '<td class="muted-note">No required trainings for this role</td>'}</tr>`;
      }).join('');
      // header columns = union of required trainings (kept simple: all trainings)
      const cols = CONFIG.trainings.map(t=>`<th title="${esc(t.title)}">${esc(t.title.split(' ').slice(0,3).join(' '))}</th>`).join('');
      $('view-status').innerHTML = head + `
        <div class="tbl-wrap"><table class="matrix">
          <thead><tr><th>Employee</th>${cols}</tr></thead>
          <tbody>${rows}</tbody></table></div>
        ${info&&info.local?`<p class="muted-note" style="margin-top:10px">Showing locally-stored attempts only — connect the records backend (CONFIG.records.endpoint) for shared, company-wide status.</p>`:''}`;
      // re-pad rows so every employee row spans all training columns
    });
  }

  /* ---- Trainings catalog ---- */
  function renderCatalog(){
    const cards = CONFIG.trainings.map(t=>`
      <div class="tcard reveal">
        <div class="body">
          <h3>${esc(t.title)}</h3>
          <div class="meta"><span class="chip chip-cat">${esc(t.category)}</span><span class="chip chip-rec">${esc(t.recurrence)}</span></div>
          <p>${esc(t.description||'')}</p>
        </div>
        <div class="foot">
          <span class="qn">${(t.questions||[]).length} questions · pass ${passScore(t)}%</span>
          <button class="btn sm" data-open="${esc(t.id)}">Start ▸</button>
        </div>
      </div>`).join('');
    $('view-trainings').innerHTML = `
      <div class="view-head"><h1 class="serif">Trainings</h1>
        <p>Watch the training, then take the test right here. Your result is recorded automatically.</p></div>
      <div class="grid">${cards||'<div class="empty"><b>No trainings yet</b>Add them in CONFIG.</div>'}</div>`;
    $('view-trainings').querySelectorAll('[data-open]').forEach(b=> b.onclick=()=>openTraining(b.dataset.open));
  }

  /* ---- Training detail + quiz ---- */
  let activeQuiz = null; // { training }
  function videoEmbed(t){
    if(t.video){
      return `<div class="video-wrap"><iframe src="${esc(t.video)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen title="${esc(t.title)} video"></iframe></div>`;
    }
    return `<div class="video-wrap"><div class="video-ph"><b>Training video coming soon</b>Paste the video's embed link into this training's <code>video</code> field in CONFIG.</div></div>`;
  }
  function openTraining(id){
    const t = trainingById(id); if(!t) return;
    activeQuiz = { training:t };
    $('view-detail').innerHTML = `
      <button class="btn secondary sm" id="back-cat" style="margin-bottom:16px">← All trainings</button>
      <div class="detail-card reveal">
        <div class="detail-head"><h2 class="serif">${esc(t.title)}</h2>
          <div class="meta"><span class="chip chip-cat">${esc(t.category)}</span>
            <span class="chip chip-rec">Repeats: ${esc(t.recurrence)}</span></div></div>
        ${videoEmbed(t)}
        <div class="detail-body">
          <p class="lead">${esc(t.description||'')}</p>
          <div class="quiz-intro">
            <div class="txt"><h4 class="serif">Knowledge check</h4>
              <p>${(t.questions||[]).length} questions · you need ${passScore(t)}% to pass · every attempt is recorded.</p></div>
            <button class="btn" id="start-quiz">Take the test ▸</button>
          </div>
          <div id="quiz-mount"></div>
        </div>
      </div>`;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $('view-detail').classList.add('active');
    $('tabs').querySelectorAll('.tab').forEach(b=>b.setAttribute('aria-selected','false'));
    window.scrollTo({top:0,behavior:'smooth'});
    $('back-cat').onclick = ()=>setView('trainings');
    $('start-quiz').onclick = ()=>{
      if(!getIdentity()){ openIdModal(()=>renderQuiz(t)); return; }
      renderQuiz(t);
    };
  }
  function renderQuiz(t){
    const qs = t.questions||[];
    $('quiz-mount').innerHTML = qs.map((q,i)=>`
      <div class="q-block" data-q="${i}">
        <div class="q-num">Question ${i+1} of ${qs.length}</div>
        <div class="q-text">${esc(q.q)}</div>
        ${q.options.map((o,j)=>`
          <label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span><span class="mark"></span></label>
        `).join('')}
      </div>`).join('') + `
      <div class="quiz-actions">
        <button class="btn" id="submit-quiz">Submit test</button>
        <span class="warn" id="quiz-warn" style="display:none">Please answer every question before submitting.</span>
      </div>`;
    $('start-quiz').disabled = true;
    $('submit-quiz').onclick = ()=>gradeQuiz(t);
    $('quiz-mount').scrollIntoView({behavior:'smooth', block:'start'});
  }
  function gradeQuiz(t){
    const qs = t.questions||[];
    const chosen = qs.map((q,i)=>{
      const sel = document.querySelector(`input[name="q${i}"]:checked`);
      return sel ? Number(sel.value) : -1;
    });
    if(chosen.some(c=>c<0)){ $('quiz-warn').style.display='inline'; return; }
    $('quiz-warn').style.display='none';
    let correct = 0;
    qs.forEach((q,i)=>{ if(chosen[i]===q.answer) correct++; });
    const total = qs.length;
    const percent = Math.round((correct/total)*100);
    const result = percent >= passScore(t) ? 'Pass' : 'Fail';

    // lock + mark answers for review
    qs.forEach((q,i)=>{
      const block = document.querySelector(`.q-block[data-q="${i}"]`);
      block.querySelectorAll('.opt').forEach((opt,j)=>{
        opt.querySelector('input').disabled = true;
        if(j===q.answer){ opt.classList.add('correct'); opt.querySelector('.mark').textContent='Correct answer'; }
        if(j===chosen[i] && chosen[i]!==q.answer){ opt.classList.add('wrong'); opt.querySelector('.mark').textContent='Your answer'; }
      });
    });

    const u = getIdentity() || { name:'Unknown' };
    const rec = {
      ts:new Date().toISOString(), name:u.name, id:u.id||'',
      trainingId:t.id, title:t.title, correct, total, percent, result,
      answers: chosen.join('')   // chosen option index per question, compact
    };

    const mount = $('quiz-mount');
    const card = document.createElement('div');
    card.className = 'result ' + (result==='Pass'?'pass':'fail');
    card.innerHTML = `
      <div class="ring">${percent}%</div>
      <h2 class="serif">${result==='Pass'?'You passed':'Not yet — try again'}</h2>
      <div class="sub">${esc(u.name)} · ${correct} of ${total} correct · ${esc(t.title)}</div>
      <div class="logged" id="log-state">Recording your attempt…</div>
      <div class="quiz-actions" style="justify-content:center;margin-top:18px">
        <button class="btn secondary" id="retake">Retake test</button>
        <button class="btn secondary" id="to-records">View records</button>
        <button class="btn" id="to-cat">Back to trainings</button>
      </div>`;
    mount.innerHTML = '';
    mount.appendChild(card);
    mount.scrollIntoView({behavior:'smooth', block:'start'});

    logAttempt(rec, (resp)=>{
      const el = $('log-state'); if(!el) return;
      if(resp && resp.ok && !resp.local){ el.textContent = '✓ Attempt recorded to the company training log.'; }
      else if(resp && resp.local){ el.textContent = '✓ Attempt saved on this device (connect the records backend to log company-wide).'; el.classList.add('local'); }
      else { el.textContent = 'Saved locally; the company log could not be reached.'; el.classList.add('local'); }
    });

    $('retake').onclick = ()=>openTraining(t.id);
    $('to-cat').onclick = ()=>setView('trainings');
    $('to-records').onclick = ()=>setView('records');
  }

  /* ---- Records (every attempt) ---- */
  let recordCache = [];
  function renderRecords(){
    $('view-records').innerHTML = `
      <div class="view-head"><h1 class="serif">Completion Records</h1>
        <p>Every test attempt, newest first. These are kept separately from the trainings so nothing is overwritten.</p></div>
      <div class="toolbar">
        <span class="field"><input id="rec-search" type="text" placeholder="Filter by name or training…"></span>
        <span class="field"><select id="rec-result"><option value="">All results</option><option>Pass</option><option>Fail</option></select></span>
        <span class="spacer"></span>
        <button class="btn secondary sm" id="rec-refresh">Refresh</button>
        <button class="btn secondary sm" id="rec-csv">Export CSV</button>
      </div>
      <div id="rec-mount"><p class="muted-note">Loading records…</p></div>`;
    const draw = ()=>{
      fetchRecords((records, info)=>{
        recordCache = records;
        paintRecords(records, info);
      });
    };
    $('rec-refresh').onclick = draw;
    $('rec-search').oninput = ()=>paintRecords(recordCache);
    $('rec-result').onchange = ()=>paintRecords(recordCache);
    $('rec-csv').onclick = exportCsv;
    draw();
  }
  function fmtDate(v){
    const d = new Date(v); if(isNaN(d)) return esc(v);
    return d.toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }
  function paintRecords(records, info){
    const q = ($('rec-search')?.value||'').toLowerCase();
    const rf = ($('rec-result')?.value||'');
    const filtered = (records||[]).filter(r=>{
      const hay = `${r.Name||''} ${r.Training||r.title||''} ${r['Employee ID']||''}`.toLowerCase();
      const okQ = !q || hay.includes(q);
      const okR = !rf || (r.Result||'')===rf;
      return okQ && okR;
    });
    const mount = $('rec-mount');
    if(!filtered.length){
      mount.innerHTML = `<div class="empty"><b>No attempts recorded</b>Once someone completes a test, every attempt shows up here.</div>`;
    } else {
      mount.innerHTML = `
        <div class="tbl-wrap"><table class="records">
          <thead><tr><th>Date</th><th>Name</th><th>ID</th><th>Training</th><th>Score</th><th>%</th><th>Result</th></tr></thead>
          <tbody>${filtered.map(r=>`
            <tr>
              <td>${fmtDate(r.Timestamp||r.ts)}</td>
              <td>${esc(r.Name||'')}</td>
              <td>${esc(r['Employee ID']||r.id||'')}</td>
              <td>${esc(r.Training||r.title||'')}</td>
              <td>${esc(r.Score!=null?r.Score:r.correct)}/${esc(r.Total!=null?r.Total:r.total)}</td>
              <td>${esc(r.Percent!=null?r.Percent:r.percent)}%</td>
              <td class="${(r.Result||'')==='Pass'?'res-pass':'res-fail'}">${esc(r.Result||'')}</td>
            </tr>`).join('')}</tbody></table></div>
        <p class="muted-note" style="margin-top:10px">${filtered.length} attempt${filtered.length!==1?'s':''} shown${info&&info.local?' · stored on this device only — connect the records backend for shared records':''}.</p>`;
    }
  }
  function exportCsv(){
    const rows = recordCache||[];
    const head = ['Timestamp','Name','Employee ID','Training','Score','Total','Percent','Result'];
    const lines = [head.join(',')].concat(rows.map(r=>[
      r.Timestamp||r.ts||'', r.Name||'', r['Employee ID']||r.id||'', r.Training||r.title||'',
      (r.Score!=null?r.Score:r.correct), (r.Total!=null?r.Total:r.total),
      (r.Percent!=null?r.Percent:r.percent), r.Result||''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')));
    const blob = new Blob([lines.join('\n')], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'training-records.csv';
    a.click(); URL.revokeObjectURL(a.href);
  }

  /* ---- boot ---- */
  renderWho();
  buildTabs();
  renderMatrix();
})();
</script>
</body>
</html>
