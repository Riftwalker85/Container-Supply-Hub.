<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Supply — Training Portal</title>
<link rel="icon" type="image/png" href="csc-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===============================================================
   THEME TOKENS — matched to the Container Supply Info Hub.
   =============================================================== */
:root{
  --navy:#122150; --navy-700:#1b2f6b;
  --royal:#2540bf; --royal-700:#1c33a0;
  --sky:#eaf0fb; --sky-line:#d8e2f6;
  --paper:#f4f7fc; --surface:#ffffff;
  --line:#dde4f1; --ink:#1b2333; --muted:#5a6479;
  --green:#2f8f5b; --green-bg:#e7f5ee;
  --amber:#b6791f; --amber-bg:#fbf1de;
  --red:#c0392b; --red-bg:#fbe9e7;
  --shadow:0 1px 2px rgba(18,33,80,.05), 0 8px 22px rgba(18,33,80,.06);
  --radius:11px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Source Sans 3',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5}
.serif{font-family:'Source Serif 4',Georgia,serif}
a{color:var(--royal)}

/* ── top bar ── */
header.topbar{background:var(--surface);border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(18,33,80,.04),0 6px 18px rgba(18,33,80,.04);position:sticky;top:0;z-index:50}
.topbar::before{content:'';display:block;height:4px;background:linear-gradient(90deg,var(--navy),var(--royal))}
.topbar-inner{max-width:1240px;margin:0 auto;padding:13px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px;flex:1 1 auto;min-width:220px}
.brand img.mark{height:42px;width:auto;display:block}
.brand .wordmark .co{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.22rem;
  letter-spacing:.04em;text-transform:uppercase;color:var(--navy);line-height:1.05}
.brand .wordmark .hub{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--royal);font-weight:600;margin-top:3px}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.who{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted);
  background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 13px}
.who b{color:var(--navy);font-weight:600}
.who button{border:none;background:none;color:var(--royal);font:inherit;font-size:.78rem;cursor:pointer;padding:0;font-weight:600}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--navy);
  border:1px solid var(--line);border-radius:8px;padding:7px 13px;font-size:.85rem;font-weight:600;background:var(--surface)}
.btn-ghost:hover{border-color:var(--royal);color:var(--royal)}

/* ── tabs ── */
.tabbar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:59px;z-index:40}
.tabbar-inner{max-width:1240px;margin:0 auto;padding:0 28px;display:flex;gap:4px;overflow-x:auto}
.tab{appearance:none;border:none;background:none;font:inherit;cursor:pointer;white-space:nowrap;
  padding:14px 16px;font-size:.92rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--navy)}
.tab[aria-selected="true"]{color:var(--royal);border-bottom-color:var(--royal)}
.tab .cnt{font-size:.7rem;background:var(--sky);color:var(--royal);border-radius:999px;padding:1px 8px;margin-left:6px;font-weight:700}

/* ── layout ── */
main{max-width:1240px;margin:0 auto;padding:28px 28px 72px}
.view{display:none}.view.active{display:block}
.view-head{margin-bottom:18px}
.view-head h1{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.7rem;color:var(--navy);letter-spacing:.005em}
.view-head p{color:var(--muted);font-size:.95rem;margin-top:4px;max-width:70ch}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0 18px}
.field{position:relative}
.field input,.field select{font:inherit;font-size:.9rem;padding:9px 13px;border:1px solid var(--line);
  border-radius:8px;background:var(--surface);color:var(--ink);min-width:200px}
.field input:focus,.field select:focus{outline:none;border-color:var(--royal);box-shadow:0 0 0 3px rgba(37,64,191,.12)}
.spacer{flex:1}

/* ── matrix table ── */
.tbl-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto}
table.matrix{border-collapse:collapse;width:100%;font-size:.9rem;min-width:680px}
table.matrix th,table.matrix td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}
table.matrix thead th{background:var(--navy);color:#fff;font-weight:600;font-size:.82rem;letter-spacing:.02em;
  position:sticky;top:0;text-align:center}
table.matrix thead th:first-child{text-align:left}
table.matrix tbody tr:last-child td{border-bottom:none}
table.matrix tbody tr:hover{background:var(--sky)}
.t-name{font-weight:600;color:var(--navy)}
.t-sub{display:block;font-weight:400;color:var(--muted);font-size:.78rem;margin-top:2px}
.cell-req{text-align:center}
.req-dot{display:inline-block;width:20px;height:20px;line-height:20px;border-radius:50%;
  background:var(--royal);color:#fff;font-size:.7rem;text-align:center;font-weight:700}
.req-no{color:var(--line);font-weight:700}
.chip{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:999px;text-transform:uppercase}
.chip-cat{background:var(--sky);color:var(--royal-700)}
.chip-rec{background:var(--paper);color:var(--muted);border:1px solid var(--line)}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:.82rem;color:var(--muted);align-items:center}
.legend .req-dot{margin-right:6px}

/* ── status table ── */
.status-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
.s-current{background:var(--green-bg);color:var(--green)}
.s-due{background:var(--amber-bg);color:var(--amber)}
.s-missing{background:var(--red-bg);color:var(--red)}

/* ── catalog cards ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  display:flex;flex-direction:column;border-top:3px solid var(--royal);overflow:hidden}
.tcard .body{padding:18px 20px 16px;flex:1;display:flex;flex-direction:column;gap:9px}
.tcard h3{font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:1.2rem;color:var(--navy);line-height:1.18}
.tcard .meta{display:flex;gap:8px;flex-wrap:wrap}
.tcard p{font-size:.88rem;color:var(--muted);flex:1}
.tcard .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:13px 20px;border-top:1px solid var(--line);background:var(--paper)}
.tcard .qn{font-size:.78rem;color:var(--muted)}
.btn{appearance:none;border:none;cursor:pointer;font:inherit;font-weight:600;font-size:.9rem;border-radius:9px;
  padding:10px 18px;background:var(--royal);color:#fff;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--royal-700)}
.btn.sm{padding:8px 14px;font-size:.85rem}
.btn.secondary{background:var(--surface);color:var(--navy);border:1px solid var(--line)}
.btn.secondary:hover{border-color:var(--royal);color:var(--royal);background:var(--surface)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── training detail / quiz ── */
.detail-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.detail-head{padding:20px 24px;border-bottom:1px solid var(--line)}
.detail-head h2{font-family:'Source Serif 4',Georgia,serif;color:var(--navy);font-size:1.5rem}
.detail-head .meta{margin-top:8px}
.video-wrap{aspect-ratio:16/9;background:var(--navy);display:grid;place-items:center}
.video-wrap iframe{width:100%;height:100%;border:0;display:block}
.video-ph{color:#cfe0ea;text-align:center;padding:30px;font-size:.95rem}
.video-ph b{display:block;color:#fff;font-size:1.05rem;margin-bottom:6px;font-family:'Source Serif 4',serif}
.detail-body{padding:22px 24px}
.detail-body .lead{color:var(--ink);margin-bottom:6px}
.quiz-intro{background:var(--sky);border:1px solid var(--sky-line);border-radius:var(--radius);padding:16px 20px;margin:18px 0;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.quiz-intro .txt{flex:1;min-width:200px}
.quiz-intro h4{color:var(--navy);font-family:'Source Serif 4',serif;font-size:1.12rem}
.quiz-intro p{font-size:.86rem;color:var(--muted)}

.q-block{padding:18px 0;border-bottom:1px solid var(--line)}
.q-block:last-child{border-bottom:none}
.q-num{font-size:.74rem;font-weight:700;color:var(--royal);letter-spacing:.06em;text-transform:uppercase}
.q-text{font-weight:600;color:var(--navy);margin:5px 0 12px;font-size:1.02rem}
.opt{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border:1px solid var(--line);border-radius:9px;
  margin-bottom:9px;cursor:pointer;transition:.12s;background:var(--surface)}
.opt:hover{border-color:var(--royal);background:var(--sky)}
.opt input{margin-top:3px;accent-color:var(--royal);width:16px;height:16px;flex:none}
.opt.correct{border-color:var(--green);background:var(--green-bg)}
.opt.wrong{border-color:var(--red);background:var(--red-bg)}
.opt .mark{margin-left:auto;font-weight:700;font-size:.82rem}
.opt.correct .mark{color:var(--green)}
.opt.wrong .mark{color:var(--red)}
.quiz-actions{display:flex;align-items:center;gap:14px;margin-top:20px;flex-wrap:wrap}
.warn{color:var(--red);font-size:.85rem;font-weight:600}

/* ── result ── */
.result{text-align:center;padding:34px 24px}
.result .ring{width:128px;height:128px;border-radius:50%;display:grid;place-items:center;margin:0 auto 16px;
  font-family:'Source Serif 4',serif;font-weight:700;font-size:2.3rem;color:#fff}
.result.pass .ring{background:var(--green)}
.result.fail .ring{background:var(--red)}
.result h2{font-family:'Source Serif 4',serif;color:var(--navy);font-size:1.7rem}
.result .sub{color:var(--muted);margin:6px 0 4px}
.result .logged{font-size:.82rem;color:var(--green);font-weight:600;margin-top:10px}
.result .logged.local{color:var(--amber)}

/* ── records ── */
table.records{border-collapse:collapse;width:100%;font-size:.86rem;min-width:760px}
table.records th,table.records td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
table.records thead th{background:var(--paper);color:var(--navy);font-weight:600;position:sticky;top:0;
  border-bottom:2px solid var(--line);font-size:.78rem;letter-spacing:.03em;text-transform:uppercase}
table.records tbody tr:hover{background:var(--sky)}
.res-pass{color:var(--green);font-weight:700}
.res-fail{color:var(--red);font-weight:700}
.muted-note{color:var(--muted);font-size:.85rem}
.empty{text-align:center;color:var(--muted);padding:48px 20px;background:var(--surface);
  border:1px dashed var(--line);border-radius:var(--radius)}
.empty b{color:var(--navy);display:block;margin-bottom:4px;font-family:'Source Serif 4',serif;font-size:1.05rem}

/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(18,33,80,.45);display:none;place-items:center;z-index:100;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--surface);border-radius:14px;max-width:420px;width:100%;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(18,33,80,.3)}
.modal h3{font-family:'Source Serif 4',serif;color:var(--navy);font-size:1.3rem;margin-bottom:4px}
.modal p{color:var(--muted);font-size:.88rem;margin-bottom:16px}
.modal label{display:block;font-size:.82rem;font-weight:600;color:var(--navy);margin:12px 0 5px}
.modal input{width:100%;font:inherit;padding:10px 13px;border:1px solid var(--line);border-radius:8px}
.modal input:focus{outline:none;border-color:var(--royal);box-shadow:0 0 0 3px rgba(37,64,191,.12)}
.modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── footer ── */
footer{background:var(--navy);color:rgba(255,255,255,.72)}
.footer-inner{max-width:1240px;margin:0 auto;padding:22px 28px;display:flex;justify-content:space-between;
  align-items:center;gap:16px;flex-wrap:wrap;font-size:.78rem;letter-spacing:.03em}
.footer-inner a{color:#fff}
.footer-brand{display:flex;align-items:center;gap:10px}
.footer-brand img{height:28px;opacity:.95}
.footer-brand .ftxt{font-family:'Source Serif 4',serif;text-transform:uppercase;color:#fff;font-weight:600;font-size:.8rem;letter-spacing:.05em}

@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.reveal{animation:rise .4s ease both}
@media(max-width:560px){
  .topbar-inner,.tabbar-inner,main,.footer-inner{padding-left:16px;padding-right:16px}
  .who{display:none}
}
@media(prefers-reduced-motion:reduce){.reveal{animation:none}}

/* language toggle */
.langtog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.langtog .lt{appearance:none;border:none;background:var(--surface);font:inherit;font-size:.8rem;font-weight:700;color:var(--muted);padding:6px 12px;cursor:pointer}
.langtog .lt.on{background:var(--royal);color:#fff}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img class="mark" src="csc-mark.png" alt="Container Supply" onerror="this.style.display='none'">
      <div class="wordmark"><div class="co">Container Supply</div><div class="hub">Training Portal</div></div>
    </div>
    <div class="topbar-actions">
      <span class="langtog" id="langtog"></span>
      <span class="who" id="who"></span>
      <a class="btn-ghost" href="index.html">← Hub</a>
    </div>
  </div>
</header>

<nav class="tabbar"><div class="tabbar-inner" id="tabs" role="tablist"></div></nav>

<main>
  <section class="view active" id="view-matrix"></section>
  <section class="view" id="view-status"></section>
  <section class="view" id="view-trainings"></section>
  <section class="view" id="view-detail"></section>
  <section class="view" id="view-records"></section>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand"><img src="csc-mark-white.png" alt="Container Supply" onerror="this.style.display='none'"><span class="ftxt">Container Supply Co.</span></div>
    <div>Internal use only • Garden Grove, CA • Training records retained per SQF requirements</div>
  </div>
</footer>

<div class="modal-bg" id="id-modal">
  <div class="modal">
    <h3 id="idm-title">Before you begin</h3>
    <p id="idm-sub">Enter your name so your test attempts are recorded under the right person.</p>
    <label id="idm-name-label" for="id-name">Full name</label>
    <input id="id-name" type="text" autocomplete="name">
    <div class="row">
      <button class="btn secondary" id="id-cancel">Cancel</button>
      <button class="btn" id="id-save">Save &amp; continue</button>
    </div>
  </div>
</div>

<script>

const CONFIG = {
  /* Paste your deployed Apps Script /exec URL here so tests are graded and
     recorded centrally. Until this is set, tests cannot be graded (the answer
     key now lives only in the Apps Script, not in this page). */
  records: { endpoint: 'https://script.google.com/a/macros/cscmfg.com/s/AKfycbxyFdm5uXHTAstfdpTHma1RXPWsDTfKETALJmHkM7uc-9n3yyRle3osBoGdlHTkH0M/exec', defaultPassingScore: 80 },

  // Roles = job titles from the Title column of FRM-025-003 Training Matrix.
  roles: ["Acctng-ActngClerk", "Electrical", "HmnRsrce-Director", "MtlDec-Foreman", "MtlDec-CtrOpr.trn", "MtlDec-Supervisor", "MtlDec-LiftDriver", "MtlDec-Utility", "MachShp-Mech.", "MtlDec-Presmn Trn", "MachShp-Mach.", "MachShp-Supervisor", "MachShop Trainee", "Metal-Supervisor", "Mtl-Bodymaker Op", "Metal-Press Opr.", "Janitor/Co-Wide", "Mtl-Utility", "Metal Sltr Bdymkr", "Metal-Line Opr.", "Mtl-Inv Control", "Metals-Foreman", "Metal-Foreman", "Palletizer", "Metal-Lead Man", "PlsDec-Pring Op", "Plastic-Packer", "PlsDec-LeadMan", "Pls-MntTechnician", "Plastic-CleanUp", "Pls-Set-Up Man", "Pls-SetUp/FKLFT", "Plastic-Leadman", "Plastic-Foreman", "Plastic Supervisor", "Maintenance Foreman", "Metal Press Mech", "Metal-Slit.Mech.", "Purchasing Manager", "President", "Chief Financial Officer", "QA-Trainee", "QA-Technical Dir.", "S&R-TrkDriver", "S&R-WareHouse", "S&R-WRHSE/TRKDRVR", "S&R-Foreman", "Logistics Manager", "Sales-Sales Rep.", "Sales/Mktg. Dir.", "Metal-CoilLineOpr"],

  // Optional roster for the Completion Status tab: { name, id, role }. Empty by
  // default because this page is public on GitHub Pages (no employee PII embedded).
  employees: [],

  trainings:
    [
      {
        "id": "gmp",
        "title": "GMP (including Personal Hygiene)",
        "category": "Quality & Food Safety",
        "required": "ALL",
        "recurrence": "Annual",
        "passingScore": 80,
        "video": {"en": "https://www.youtube.com/embed/ucUh6cX1t9g", "es": "https://www.youtube.com/embed/CeiMrW9qHj4"},
        "description": "Good Manufacturing Practices that keep our cans and containers safe for food contact: personal hygiene, foreign-material control, plant and grounds, and employee conduct (PRO-009-000).",
        "questions": [
          {
            "q": {
              "en": "According to PRO-009-000, who holds the primary responsibility for ensuring that cGMPs are implemented and maintained at Container Supply Co.?",
              "es": "Según PRO-009-000, ¿quién es el principal responsable de garantizar que las cGMP sean implementadas y mantenidas en Container Supply Co.?"
            },
            "options": {
              "en": [
                "The SQF Practitioner",
                "The Quality Manager",
                "Senior Management",
                "All employees equally"
              ],
              "es": [
                "El Practicante SQF",
                "El Gerente de Calidad",
                "La Alta Dirección",
                "Todos los empleados por igual"
              ]
            }
          },
          {
            "q": {
              "en": "If an employee has an open wound, boil, or sore that could contaminate food-contact packaging, they must:",
              "es": "Si un empleado tiene una herida abierta, furúnculo o llaga que podría contaminar el empaque en contacto con alimentos, debe:"
            },
            "options": {
              "en": [
                "Use additional gloves and continue working",
                "Apply a bandage and continue their shift without reporting it",
                "Report to their supervisor and be excluded from operations until the condition is corrected",
                "Work only in the warehouse, away from active production"
              ],
              "es": [
                "Usar guantes adicionales y continuar trabajando",
                "Aplicar un vendaje y continuar su turno sin reportarlo",
                "Reportar a su supervisor y ser excluido de las operaciones hasta que la condición sea corregida",
                "Trabajar solo en el almacén, lejos de la producción activa"
              ]
            }
          },
          {
            "q": {
              "en": "Under PRO-009-000, which statement BEST describes an employee's reporting obligations?",
              "es": "Según PRO-009-000, ¿qué enunciado describe MEJOR las obligaciones de reporte de un empleado?"
            },
            "options": {
              "en": [
                "Employees should report GMP violations only if they directly cause a safety incident",
                "Reporting is required only for health-related concerns such as illness or injury",
                "Employees are required to immediately report any health concern, GMP violation, unsafe condition, or contamination risk to their supervisor",
                "An employee who observes but does not report a known GMP violation is not personally responsible for the violation"
              ],
              "es": [
                "Los empleados deben reportar las violaciones a las BPM solo si directamente causan un incidente de seguridad",
                "El reporte es requerido únicamente para asuntos relacionados con la salud, como enfermedades o lesiones",
                "Los empleados están obligados a reportar de inmediato cualquier problema de salud, violación a las BPM, condición insegura o riesgo de contaminación a su supervisor",
                "Un empleado que observa pero no reporta una violación conocida a las BPM no es personalmente responsable de la violación"
              ]
            }
          },
          {
            "q": {
              "en": "Which of the following correctly lists the 5-Step Handwashing procedure required at Container Supply Co.?",
              "es": "¿Cuál de las siguientes opciones describe correctamente el procedimiento de lavado de manos de 5 pasos requerido en Container Supply Co.?"
            },
            "options": {
              "en": [
                "Wet hands, apply soap, rinse, dry, sanitize",
                "Apply soap, scrub 10 seconds, rinse, sanitize, dry",
                "Rinse with water, lather with soap, scrub for 20 seconds, rinse hands, dry with single-service towel",
                "Rinse, scrub 10 seconds, soap, rinse, air dry"
              ],
              "es": [
                "Mojarse las manos, aplicar jabón, enjuagar, secar, sanitizar",
                "Aplicar jabón, tallar 10 segundos, enjuagar, sanitizar, secar",
                "Enjuagar con agua, enjabonar, tallar por 20 segundos, enjuagar las manos, secar con toalla de uso único",
                "Enjuagar, tallar 10 segundos, jabón, enjuagar, secar al aire"
              ]
            }
          },
          {
            "q": {
              "en": "Which of the following IS permitted for employees working in the production or warehouse area?",
              "es": "¿Cuál de los siguientes artículos está PERMITIDO para los empleados que trabajan en el área de producción o almacén?"
            },
            "options": {
              "en": [
                "Earrings and small rings under gloves",
                "Cologne or light perfume",
                "Rubber or slip-resistant closed-toe shoes",
                "False fingernails without nail polish"

  function T(k){ return (I18N[getLang()]||I18N.en)[k]; }

  /* ---- identity ---- */
  const ID_KEY='csc_tp_identity';
  function getIdentity(){ try{ return JSON.parse(localStorage.getItem(ID_KEY)||'null'); }catch(_){ return null; } }

      ? `${esc(T('signedAs'))} <b>${esc(u.name)}</b>${u.id?` (#${esc(u.id)})`:''} &nbsp;<button id="who-change">${esc(T('change'))}</button>`

    const b=$('who-change'); if(b) b.onclick=()=>openIdModal();
  }
  let idCallback=null;
  function openIdModal(cb){
    idCallback=cb||null;

  /* ---- JSONP ---- */
  let jpN=0;
  function jsonp(baseUrl, cb){
    const name='__csc_tp_cb_'+(jpN++); const sep=baseUrl.indexOf('?')>=0?'&':'?';
    const s=document.createElement('script'); let done=false;
    const finish=(data,err)=>{ if(done)return; done=true; try{delete window[name];}catch(_){window[name]=undefined;} s.remove(); cb(data,err); };
    window[name]=data=>finish(data,null); s.onerror=()=>finish(null,'network');
    s.src=baseUrl+sep+'callback='+name; document.body.appendChild(s);
    setTimeout(()=>finish(null,'timeout'), 12000);
  }
  function fetchRecords(cb){
    const ep=(CONFIG.records.endpoint||'').trim();
    if(!ep){ cb([], {local:true}); return; }
    jsonp(ep+'?action=records', (data,err)=>{
      if(err||!data||!data.ok) cb([], {local:true, error:err||'load failed'});
      else cb(data.records||[], {local:false});
    });
  }

  /* ---- helpers ---- */
  function recurrenceDays(r){ return ({Once:Infinity, Monthly:30, Quarterly:91, Annual:365, Biennial:730, Triennial:1095})[r] ?? 365; }
  function trainingById(id){ return CONFIG.trainings.find(t=>t.id===id); }
  function passScore(t){ return t.passingScore || PASS_DEFAULT; }
  function isRequired(t, role){ return t.required==='ALL' || (Array.isArray(t.required) && t.required.includes(role)); }

  /* ---- tabs / views ---- */
  const VIEWS=[{id:'matrix',label:'Required Trainings by Job Title'},{id:'status',label:'Completion Status'},{id:'trainings',label:'Trainings',count:()=>CONFIG.trainings.length},{id:'records',label:'Records'}];
  function buildTabs(){
    $('tabs').innerHTML=VIEWS.map(v=>`<button class="tab" role="tab" data-view="${v.id}" aria-selected="${v.id==='matrix'}">${esc(v.label)}${v.count?`<span class="cnt">${v.count()}</span>`:''}</button>`).join('');
    $('tabs').querySelectorAll('.tab').forEach(b=> b.onclick=()=>setView(b.dataset.view));
  }
  function setView(name, skipScroll){
    currentView=name;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $('view-'+name).classList.add('active');
    $('tabs').querySelectorAll('.tab').forEach(b=> b.setAttribute('aria-selected', b.dataset.view===name));
    if(!skipScroll) window.scrollTo({top:0,behavior:'smooth'});

    if(name==='status') renderStatus();
    if(name==='trainings') renderCatalog();

  /* ---- Matrix: roles (rows) × trainings (cols) ---- */
  function renderMatrix(){
    const ts=CONFIG.trainings;
    const body=CONFIG.roles.map(role=>{
      const cells=ts.map(t=>`<td class="cell-req">${isRequired(t,role)?`<span class="req-dot" title="Required: ${esc(t.title)}">\u2713</span>`:'<span class="req-no">\u00b7</span>'}</td>`).join('');

      <div class="view-head"><h1 class="serif">Required Trainings by Job Title</h1>

      <div class="tbl-wrap"><table class="matrix">
        <thead><tr><th>Role (job title)</th>${ts.map(t=>`<th title="${esc(t.title)}">${esc(t.title)}<span style="display:block;font-weight:400;font-size:.72rem;color:#c2cbe0;margin-top:2px">${esc(t.recurrence)}</span></th>`).join('')}</tr></thead>
        <tbody id="mx-body">${body}</tbody></table></div>`;
    const s=$('mx-search'); if(s) s.oninput=()=>{ const qv=s.value.toLowerCase();

  }

  /* ---- Completion Status ---- */
  function latestPass(records, name, trainingId){
    let best=null;
    records.forEach(r=>{ const rn=(r.Name||'').toLowerCase().trim(); const rt=(r['Training ID']||r.trainingId||''); const res=(r.Result||'').toLowerCase();
      if(rn===name.toLowerCase().trim() && rt===trainingId && res==='pass'){ const ts=new Date(r.Timestamp||r.ts||0).getTime(); if(!best||ts>best) best=ts; } });
    return best;
  }
  function renderStatus(){
    const head=`<div class="view-head"><h1 class="serif">Completion Status</h1>
      <p>Each employee's standing on the trainings their role requires, based on recorded test passes. <span class="muted-note">Current = passed within the repeat window \u00b7 Due = passed but expired \u00b7 Missing = no passing attempt on record.</span></p></div>`;
    if(!CONFIG.employees||!CONFIG.employees.length){
      $('view-status').innerHTML=head+`<div class="empty"><b>No roster yet</b>Add staff to the <code>employees</code> list in CONFIG to track who is current, due, or missing each required training.</div>`; return;
    }
    $('view-status').innerHTML=head+`<div class="muted-note">Loading records\u2026</div>`;
    fetchRecords((records,info)=>{
      const now=Date.now();
      const rows=CONFIG.employees.map(emp=>{
        const cells=CONFIG.trainings.map(t=>{
          if(!isRequired(t,emp.role)) return `<td style="text-align:center;color:#c2cbe0">\u2014</td>`;
          const lp=latestPass(records,emp.name,t.id); let cls='s-missing',txt='Missing';
          if(lp){ const days=(now-lp)/86400000; if(days<=recurrenceDays(t.recurrence)){cls='s-current';txt='Current';} else {cls='s-due';txt='Due';} }
          return `<td><span class="status-tag ${cls}" title="${esc(t.title)}">${txt}</span></td>`;
        }).join('');
        return `<tr><td><span class="t-name">${esc(emp.name)}</span><span class="t-sub">${esc(emp.role)}${emp.id?` \u00b7 #${esc(emp.id)}`:''}</span></td>${cells}</tr>`;
      }).join('');
      const cols=CONFIG.trainings.map(t=>`<th title="${esc(t.title)}">${esc(t.title.split(' ').slice(0,3).join(' '))}</th>`).join('');
      $('view-status').innerHTML=head+`<div class="tbl-wrap"><table class="matrix"><thead><tr><th>Employee</th>${cols}</tr></thead><tbody>${rows}</tbody></table></div>${info&&info.local?`<p class="muted-note" style="margin-top:10px">No central records yet \u2014 connect CONFIG.records.endpoint for company-wide status.</p>`:''}`;
    });
  }

          <button class="btn sm" data-open="${esc(t.id)}">${esc(T('start'))}</button></div></div>`).join('');
    $('view-trainings').innerHTML=`<div class="view-head"><h1 class="serif">Trainings</h1><p>Watch the training, then take the test right here. Your result is recorded automatically.</p></div><div class="grid">${cards}</div>`;
    $('view-trainings').querySelectorAll('[data-open]').forEach(b=> b.onclick=()=>openTraining(b.dataset.open));
  }

  /* ---- Detail + quiz ---- */
  function videoEmbed(t){
    const _vs=LX(t.video); if(_vs) return `<div class="video-wrap"><iframe src="${esc(_vs)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen title="${esc(t.title)}"></iframe></div>`;
    return `<div class="video-wrap"><div class="video-ph"><b>${esc(T('videoSoon'))}</b>${esc(T('videoSoonSub'))}</div></div>`;
  }
  function openTraining(id){
    const t=trainingById(id); if(!t) return; activeTrainingId=id;
    $('view-detail').innerHTML=`
      <button class="btn secondary sm" id="back-cat" style="margin-bottom:16px">${esc(T('allTrainings'))}</button>
      <div class="detail-card reveal">
        <div class="detail-head"><h2 class="serif">${esc(t.title)}</h2>
          <div class="meta"><span class="chip chip-cat">${esc(t.category)}</span><span class="chip chip-rec">${esc(T('repeats'))}: ${esc(t.recurrence)}</span></div></div>
        ${videoEmbed(t)}
        <div class="detail-body">
          <p class="lead">${esc(t.description||'')}</p>
          <div class="quiz-intro"><div class="txt"><h4 class="serif">${esc(T('knowledge'))}</h4><p>${esc(T('passNeed')((t.questions||[]).length, passScore(t)))}</p></div>
            <button class="btn" id="start-quiz">${esc(T('take'))}</button></div>
          <div id="quiz-mount"></div>
        </div></div>`;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $('view-detail').classList.add('active'); currentView='detail';
    $('tabs').querySelectorAll('.tab').forEach(b=>b.setAttribute('aria-selected','false'));
    window.scrollTo({top:0,behavior:'smooth'});
    $('back-cat').onclick=()=>setView('trainings');
    $('start-quiz').onclick=()=>{ if(!getIdentity()){ openIdModal(()=>renderQuiz(t)); return; } renderQuiz(t); };
  }
  function renderQuiz(t){
    const qs=t.questions||[]; const lang=getLang();
    $('quiz-mount').innerHTML=qs.map((q,i)=>`
      <div class="q-block" data-q="${i}"><div class="q-num">${esc(T('qof')(i+1,qs.length))}</div>
        <div class="q-text">${esc(LX(q.q))}</div>
        ${LX(q.options).map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span><span class="mark"></span></label>`).join('')}
      </div>`).join('')+`
      <div class="quiz-actions"><button class="btn" id="submit-quiz">${esc(T('submit'))}</button><span class="warn" id="quiz-warn" style="display:none"></span></div>`;
    $('start-quiz').disabled=true;
    $('submit-quiz').onclick=()=>submitQuiz(t);
    $('quiz-mount').scrollIntoView({behavior:'smooth',block:'start'});
  }
  function submitQuiz(t){
    const qs=t.questions||[];
    const chosen=qs.map((q,i)=>{ const s=document.querySelector(`input[name="q${i}"]:checked`); return s?Number(s.value):-1; });
    const warn=$('quiz-warn');
    if(chosen.some(c=>c<0)){ warn.textContent=T('answerAll'); warn.style.display='inline'; return; }
    warn.style.display='none';
    const ep=(CONFIG.records.endpoint||'').trim();
    if(!ep){ warn.textContent=T('needBackend'); warn.style.display='inline'; return; }
    const sub=$('submit-quiz'); sub.disabled=true; sub.textContent=T('grading');
    qs.forEach((q,i)=> document.querySelectorAll(`input[name="q${i}"]`).forEach(inp=>inp.disabled=true));
    const u=getIdentity()||{name:'Unknown'};
    const p=new URLSearchParams({ action:'grade', trainingId:t.id, title:t.title, name:u.name, id:u.id||'', answers:chosen.join(','), lang:getLang(), ua:(navigator.userAgent||'').slice(0,120) });
    jsonp(ep+'?'+p.toString(), (data,err)=>{
      if(err||!data||!data.ok){ sub.disabled=false; sub.textContent=T('submit'); qs.forEach((q,i)=>document.querySelectorAll(`input[name="q${i}"]`).forEach(inp=>inp.disabled=false));
        warn.textContent=T('gradeFail'); warn.style.display='inline'; return; }
      renderResult(t,u,chosen,data);
    });
  }
  function renderResult(t,u,chosen,data){
    const qs=t.questions||[]; const wrong=new Set(data.wrong||[]);
    qs.forEach((q,i)=>{ const block=document.querySelector(`.q-block[data-q="${i}"]`); if(!block) return;
      block.querySelectorAll('.opt').forEach((opt,j)=>{
        if(wrong.has(i) && j===chosen[i]){ opt.classList.add('wrong'); opt.querySelector('.mark').textContent=T('yourAnswer'); }
        if(data.key && j===data.key[i]){ opt.classList.add('correct'); opt.querySelector('.mark').textContent=T('correctAnswer'); }
      }); });
    const pass=data.result==='Pass';
    const card=document.createElement('div'); card.className='result '+(pass?'pass':'fail');
    card.innerHTML=`<div class="ring">${data.percent}%</div>
      <h2 class="serif">${esc(pass?T('passed'):T('failed'))}</h2>
      <div class="sub">${esc(T('scoreLine')(u.name,data.correct,data.total,t.title))}</div>
      <div class="logged">${esc(T('recorded'))}</div>
      ${(data.wrong&&data.wrong.length)?`<div class="muted-note" style="margin-top:6px">${esc(T('reviewMissed'))}</div>`:''}
      <div class="quiz-actions" style="justify-content:center;margin-top:18px">
        <button class="btn secondary" id="retake">${esc(T('retake'))}</button>
        <button class="btn secondary" id="to-records">${esc(T('viewRecords'))}</button>
        <button class="btn" id="to-cat">${esc(T('backTrainings'))}</button></div>`;
    $('quiz-mount').appendChild(card); card.scrollIntoView({behavior:'smooth',block:'center'});
    $('retake').onclick=()=>openTraining(t.id);
    $('to-cat').onclick=()=>setView('trainings');
    $('to-records').onclick=()=>setView('records');
  }

  /* ---- Records ---- */
  let recordCache=[];
  function renderRecords(){
    $('view-records').innerHTML=`<div class="view-head"><h1 class="serif">Completion Records</h1><p>Every test attempt, newest first. Graded and stored separately from the trainings so nothing is overwritten.</p></div>
      <div class="toolbar"><span class="field"><input id="rec-search" type="text" placeholder="Filter by name or training\u2026"></span>
      <span class="field"><select id="rec-result"><option value="">All results</option><option>Pass</option><option>Fail</option></select></span>
      <span class="spacer"></span><button class="btn secondary sm" id="rec-refresh">Refresh</button><button class="btn secondary sm" id="rec-csv">Export CSV</button></div>
      <div id="rec-mount"><p class="muted-note">Loading records\u2026</p></div>`;
    const draw=()=>fetchRecords((records,info)=>{ recordCache=records; paintRecords(records,info); });
    $('rec-refresh').onclick=draw; $('rec-search').oninput=()=>paintRecords(recordCache); $('rec-result').onchange=()=>paintRecords(recordCache); $('rec-csv').onclick=exportCsv;
    draw();
  }
  function fmtDate(v){ const d=new Date(v); if(isNaN(d)) return esc(v); return d.toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  function paintRecords(records,info){
    const q=($('rec-search')?.value||'').toLowerCase(); const rf=($('rec-result')?.value||'');
    const filtered=(records||[]).filter(r=>{ const hay=`${r.Name||''} ${r.Training||''} ${r['Employee ID']||''}`.toLowerCase(); return (!q||hay.includes(q)) && (!rf||(r.Result||'')===rf); });
    const mount=$('rec-mount');
    if(!filtered.length){ mount.innerHTML=`<div class="empty"><b>No attempts recorded yet</b>${info&&info.local?'Connect CONFIG.records.endpoint, then completed tests will appear here.':'Once someone completes a test, every attempt shows up here.'}</div>`; return; }
    mount.innerHTML=`<div class="tbl-wrap"><table class="records"><thead><tr><th>Date</th><th>Name</th><th>ID</th><th>Training</th><th>Lang</th><th>Score</th><th>%</th><th>Result</th></tr></thead>
      <tbody>${filtered.map(r=>`<tr><td>${fmtDate(r.Timestamp)}</td><td>${esc(r.Name||'')}</td><td>${esc(r['Employee ID']||'')}</td><td>${esc(r.Training||'')}</td><td>${esc((r.Language||'').toString().toUpperCase())}</td><td>${esc(r.Score)}/${esc(r.Total)}</td><td>${esc(r.Percent)}%</td><td class="${(r.Result||'')==='Pass'?'res-pass':'res-fail'}">${esc(r.Result||'')}</td></tr>`).join('')}</tbody></table></div>
      <p class="muted-note" style="margin-top:10px">${filtered.length} attempt${filtered.length!==1?'s':''} shown.</p>`;
  }
  function exportCsv(){
    const rows=recordCache||[]; const head=['Timestamp','Name','Employee ID','Training','Language','Score','Total','Percent','Result'];
    const lines=[head.join(',')].concat(rows.map(r=>[r.Timestamp||'',r.Name||'',r['Employee ID']||'',r.Training||'',r.Language||'',r.Score,r.Total,r.Percent,r.Result||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')));
    const blob=new Blob([lines.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='training-records.csv'; a.click(); URL.revokeObjectURL(a.href);
  }

  /* ---- boot ---- */
  document.documentElement.lang=getLang();
  renderLangToggle(); renderWho(); buildTabs(); renderMatrix();
})();
</script>
</body>
</html>
