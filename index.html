<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Supply Info Hub</title>
<link rel="icon" type="image/png" href="csc-mark.png">

<!-- ============================================================= -->
<!--  FONTS                                                        -->
<!-- ============================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ===============================================================
   THEME TOKENS  — colors are drawn from the company logo / brand.
   Change them in ONE place here.
   =============================================================== */
:root{
  --navy:       #122150;   /* deep brand navy (logo wordmark)        */
  --navy-700:   #1b2f6b;
  --royal:      #2540bf;    /* refined brand royal (logo mark)        */
  --royal-700:  #1c33a0;
  --sky:        #eaf0fb;    /* pale blue tint                         */
  --sky-line:   #d8e2f6;
  --paper:      #f4f7fc;    /* page background                        */
  --surface:    #ffffff;    /* cards                                  */
  --line:       #dde4f1;    /* hairline borders                       */
  --ink:        #1b2333;    /* body text                              */
  --muted:      #5a6479;    /* secondary text                         */
  --green:      #2f8f5b;    /* status / new                           */
  --shadow:     0 1px 2px rgba(18,33,80,.05), 0 8px 22px rgba(18,33,80,.06);
  --radius:     11px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Source Sans 3',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.5;
}
.serif{font-family:'Source Serif 4',Georgia,serif}

.kicker{
  font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--royal);font-weight:600;
}

/* ===============================================================
   TOP BAR
   =============================================================== */
header.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(18,33,80,.04), 0 6px 18px rgba(18,33,80,.04);
  position:sticky;top:0;z-index:50;
}
.topbar::before{content:'';display:block;height:4px;
  background:linear-gradient(90deg,var(--navy),var(--royal));}
.topbar-inner{
  max-width:1240px;margin:0 auto;padding:14px 28px;
  display:flex;align-items:center;gap:24px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:15px;flex:1 1 auto;min-width:240px}
.brand img.mark{height:46px;width:auto;display:block}
.brand .wordmark{line-height:1.05}
.brand .wordmark .co{
  font-family:'Source Serif 4',Georgia,serif;font-weight:700;
  font-size:1.32rem;letter-spacing:.04em;text-transform:uppercase;color:var(--navy);
}
.brand .wordmark .hub{
  font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--royal);font-weight:600;margin-top:3px;
}

.clock{
  font-size:.78rem;color:var(--muted);text-align:right;line-height:1.45;white-space:nowrap;
}
.clock .time{color:var(--navy);font-weight:600;font-variant-numeric:tabular-nums}
.clock .dot{color:var(--green)}

.search-wrap{position:relative;flex:0 1 300px;min-width:200px}
.search-wrap input{
  width:100%;padding:10px 14px 10px 40px;border-radius:9px;border:1px solid var(--line);
  background:var(--paper);color:var(--ink);font-family:inherit;font-size:.92rem;transition:.15s;
}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{outline:none;border-color:var(--royal);background:#fff;
  box-shadow:0 0 0 3px rgba(37,64,191,.12)}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;stroke:var(--muted)}

/* ===============================================================
   ANNOUNCEMENT
   =============================================================== */
.announce{max-width:1240px;margin:26px auto 0;padding:0 28px}
.announce-card{
  display:flex;gap:16px;align-items:flex-start;
  background:var(--sky);
  border:1px solid var(--sky-line);border-left:4px solid var(--royal);
  border-radius:var(--radius);padding:18px 22px;
}
.announce-card .badge{
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  background:var(--royal);color:#fff;padding:5px 10px;border-radius:5px;
  font-weight:600;flex:none;margin-top:1px;
}
.announce-card .body strong{display:block;font-size:1.04rem;margin-bottom:2px;color:var(--navy);
  font-family:'Source Serif 4',Georgia,serif;font-weight:600}
.announce-card .body span{font-size:.92rem;color:var(--muted)}

/* ===============================================================
   SECTIONS
   =============================================================== */
main{max-width:1240px;margin:0 auto;padding:30px 28px 70px}
.section-head{display:flex;align-items:baseline;gap:14px;margin:34px 0 16px}
.section-head .num{font-size:.82rem;color:var(--royal);font-weight:700;font-variant-numeric:tabular-nums}
.section-head h2{
  font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.5rem;
  letter-spacing:.005em;color:var(--navy);
}
.section-head .rule{flex:1;height:1px;background:var(--line)}

/* ── Quick links ── */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.quick{
  display:flex;align-items:center;gap:13px;text-decoration:none;color:var(--ink);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;transition:.16s;box-shadow:var(--shadow);
}
.quick:hover{border-color:var(--royal);transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(18,33,80,.1)}
.quick .ico{
  width:36px;height:36px;flex:none;border-radius:9px;display:grid;place-items:center;
  background:var(--sky);color:var(--royal);font-size:1.1rem;
}
.quick .label{font-weight:600;font-size:.93rem;line-height:1.15;color:var(--navy)}
.quick .label small{display:block;font-weight:400;color:var(--muted);font-size:.74rem;margin-top:2px}

/* ── Category cards ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(296px,1fr));gap:18px}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;
  border-top-width:3px;border-top-style:solid;
}
.card-top{padding:15px 18px 13px;display:flex;align-items:center;gap:12px}
.card-top h3{
  font-family:'Source Serif 4',Georgia,serif;font-weight:600;font-size:1.18rem;
  color:var(--navy);flex:1;line-height:1.15;
}
.card-top .tag{
  font-size:.62rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;
  border:1px solid var(--line);padding:3px 8px;border-radius:5px;font-weight:600;white-space:nowrap;
}
.card-links{list-style:none;padding:4px 8px 12px}
.card-links li a{
  display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);
  padding:9px 12px;border-radius:8px;font-size:.93rem;transition:.13s;
}
.card-links li a:hover{background:var(--sky);color:var(--navy)}
.card-links li a .arrow{margin-left:auto;color:#b7c0d4;transition:.13s;font-size:.9rem}
.card-links li a:hover .arrow{color:var(--royal);transform:translateX(3px)}
.card-links li a.ext .arrow::after{content:'\2197'}
.card-links li a:not(.ext) .arrow::after{content:'\2192'}
.pill-new{
  font-size:.58rem;letter-spacing:.06em;background:var(--green);color:#fff;
  padding:2px 7px;border-radius:4px;text-transform:uppercase;font-weight:700;
}

.no-results{display:none;text-align:center;color:var(--muted);padding:50px 0;font-size:.95rem}
.no-results.show{display:block}

/* ===============================================================
   FOOTER
   =============================================================== */
footer{background:var(--navy);color:rgba(255,255,255,.72)}
.footer-inner{
  max-width:1240px;margin:0 auto;padding:24px 28px;
  display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;
  font-size:.78rem;letter-spacing:.03em;
}
.footer-brand{display:flex;align-items:center;gap:11px}
.footer-brand img{height:30px;width:auto;opacity:.95}
.footer-brand .ftxt{font-family:'Source Serif 4',Georgia,serif;letter-spacing:.05em;
  text-transform:uppercase;color:#fff;font-weight:600;font-size:.82rem}
.footer-inner a{color:#fff;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.3)}
.footer-inner a:hover{border-color:#fff}
.footer-meta{text-align:right;line-height:1.7;font-variant-numeric:tabular-nums}

/* ── entrance animation ── */
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.reveal{opacity:0;animation:rise .5s ease forwards}

@media(max-width:560px){
  .topbar-inner{gap:14px}
  .clock{display:none}
  .brand .wordmark .co{font-size:1.12rem}
  .footer-inner{flex-direction:column;align-items:flex-start}
  .footer-meta{text-align:left}
}
</style>
</head>
<body>

<!-- ============================================================= -->
<!--  TOP BAR                                                      -->
<!-- ============================================================= -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img class="mark" src="csc-mark.png" alt="Container Supply logo">
      <div class="wordmark">
        <div class="co">Container Supply</div>
        <div class="hub">Employee Information Hub</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search the hub…" autocomplete="off">
    </div>

    <div class="clock" id="clock">
      <div class="time" id="clock-time">—</div>
      <div><span class="dot">●</span> <span id="clock-date">—</span></div>
    </div>
  </div>
</header>

<!-- ANNOUNCEMENT (rendered from CONFIG) -->
<section class="announce" id="announce-mount"></section>

<!-- MAIN CONTENT (rendered from CONFIG) -->
<main>
  <div class="section-head">
    <span class="num">01</span>
    <h2 class="serif">Quick Links</h2>
    <span class="rule"></span>
  </div>
  <div class="quick-grid" id="quick-mount"></div>

  <div class="section-head">
    <span class="num">02</span>
    <h2 class="serif">Resources &amp; Reference</h2>
    <span class="rule"></span>
  </div>
  <div class="cat-grid" id="cat-mount"></div>

  <div class="no-results" id="no-results">No results match your search.</div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="csc-mark-white.png" alt="Container Supply">
      <span class="ftxt">Container Supply Co.</span>
    </div>
    <div class="footer-meta">
      Internal use only &bull; Garden Grove, CA<br>
      Rev <span id="rev">1.1</span> &bull; Updated <span id="updated">—</span> &bull; <a href="mailto:webmaster@cscmfg.com">Report a broken link</a>
    </div>
  </div>
</footer>


<script>
/* ===================================================================
   ███  EDIT EVERYTHING BELOW — THIS IS THE ONLY PART YOU TOUCH  ███
   -------------------------------------------------------------------
   To add a new page, add a line to the right list:
     { name:'Page Title', href:'pages/your-file.html' }

   • href = 'pages/foo.html'  -> a page you create (internal link, shows →)
   • href = 'https://…'       -> an outside website (shows ↗ icon)
   • add  new:true            -> shows a small green "NEW" tag
   • add  ext:true            -> forces the external ↗ icon

   Lines starting with // are notes to yourself and are ignored.
   =================================================================== */

const CONFIG = {

  /* footer info: bump these whenever you revise the page */
  revision: '1.1',
  updated:  'Jun 2026',

  /* the banner at the top. Edit text or set show:false */
  announcement: {
    show:  true,
    badge: 'New',
    title: 'Welcome to the new Container Supply Info Hub.',
    text:  'This page replaces the old employee portal and is now our central location for company communication, information, and helpful tools. Bookmark it and check back often for updates.'
  },

  /* QUICK LINKS row — icon = any emoji/letter; sub = optional caption */
  quickLinks: [
    { icon:'⚗',  label:'SDS Lookup',          sub:'Safety data sheets',href:'#', ext:true },
    { icon:'🔧', label:'Maintenance Request',  sub:'Submit a request',  href:'https://sites.google.com/cscmfg.com/csc-tablet-dashboard/?pli=1&authuser=2', ext:true },
    { icon:'📞', label:'Staff Directory',      sub:'Phone & extensions',href:'https://contacts.google.com/directory' }
  ],

  /* CATEGORY CARDS — each has a title, accent color, optional tag, and links */
  categories: [
    {
      title:'Quality & Food Safety',
      accent:'#122150', tag:'FSC 27',
      links:[
        { name:'SQF System Manual (Ed. 10)',  href:'#' },
        { name:'HACCP / Food Safety Plans',   href:'#' },
        { name:'Product Specifications',      href:'#' },
        { name:'CAPA & Corrective Action Log',href:'#' },
        { name:'Supplier Approval Program',   href:'#' },
        { name:'Internal Audit Schedule',     href:'#' }
      ]
    },
    {
      title:'Production & Operations',
      accent:'#2540bf', tag:'Plant',
      links:[
        { name:'Daily Run Schedule',          href:'#' },
        { name:'3-Piece Can Line — SOPs',     href:'#' },
        { name:'Injection Molding — SOPs',    href:'#' },
        { name:'Maintenance Requests',        href:'#' },
        { name:'OEE / Production Reports',    href:'#' }
      ]
    },
    {
      title:'Documents & Forms',
      accent:'#3a6ea5', tag:'Templates',
      links:[
        { name:'SOP Library',                 href:'#' },
        { name:'Inspection / QA Forms',       href:'#' },
        { name:'Nonconformance Report Form',  href:'#' },
        { name:'Change Request Form',         href:'#' },
        { name:'Document Control Index',      href:'#' }
      ]
    },
    {
      title:'Safety & Compliance',
      accent:'#2f8f5b', tag:'EHS',
      links:[
        { name:'Safety Data Sheets (SDS)',    href:'#' },
        { name:'Incident Reporting',          href:'#' },
        { name:'Lockout / Tagout Procedures', href:'#' },
        { name:'PPE Requirements',            href:'#' },
        { name:'Emergency Contacts',          href:'#' }
      ]
    },
    {
      title:'HR & Administration',
      accent:'#4456c7', tag:'People',
      links:[
        { name:'PTO & Time-Off Requests',     href:'#', ext:true },
        { name:'Benefits Portal',             href:'#', ext:true },
        { name:'Employee Handbook',           href:'#' },
        { name:'Training Records',            href:'#' },
        { name:'Org Chart',                   href:'#' }
      ]
    },
    {
      title:'Tools & Utilities',
      accent:'#1f7a8c', tag:'Calc',
      links:[
        { name:'Unit Converter',              href:'#' },
        { name:'Label / Lot Code Generator',  href:'#' },
        { name:'Shift Calendar',              href:'#' },
        { name:'Warehouse Exhaust Fan Calculator', href:'fancalc.html', new:true },
        { name:'Shared Drive',                href:'#', ext:true }
      ]
    }
  ]
};

/* ===================================================================
   ███  RENDER ENGINE — no need to edit anything below this line  ███
   =================================================================== */
(function(){
  const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  document.getElementById('rev').textContent = CONFIG.revision;
  document.getElementById('updated').textContent = CONFIG.updated || '';

  const a = CONFIG.announcement;
  if(a && a.show){
    document.getElementById('announce-mount').innerHTML =
      `<div class="announce-card reveal">
         <span class="badge">${esc(a.badge||'Notice')}</span>
         <div class="body"><strong>${esc(a.title||'')}</strong><span>${esc(a.text||'')}</span></div>
       </div>`;
  }

  document.getElementById('quick-mount').innerHTML = CONFIG.quickLinks.map((q,i)=>
    `<a class="quick reveal" style="animation-delay:${i*40}ms" href="${esc(q.href||'#')}" ${q.ext?'target="_blank" rel="noopener"':''}>
       <span class="ico">${esc(q.icon||'•')}</span>
       <span class="label">${esc(q.label)}${q.sub?`<small>${esc(q.sub)}</small>`:''}</span>
     </a>`).join('');

  document.getElementById('cat-mount').innerHTML = CONFIG.categories.map((cat,i)=>{
    const accent = esc(cat.accent||'#2540bf');
    const links = cat.links.map(l=>{
      const isExt = l.ext || /^https?:\/\//.test(l.href||'');
      return `<li><a class="${isExt?'ext':''}" href="${esc(l.href||'#')}" ${isExt?'target="_blank" rel="noopener"':''}>
                <span>${esc(l.name)}</span>
                ${l.new?'<span class="pill-new">New</span>':''}
                <span class="arrow"></span>
              </a></li>`;
    }).join('');
    return `<div class="card reveal" data-card style="border-top-color:${accent};animation-delay:${i*60}ms">
              <div class="card-top">
                <h3>${esc(cat.title)}</h3>
                ${cat.tag?`<span class="tag">${esc(cat.tag)}</span>`:''}
              </div>
              <ul class="card-links">${links}</ul>
            </div>`;
  }).join('');

  /* live clock — Pacific time */
  function tick(){
    const now = new Date();
    const o = {timeZone:'America/Los_Angeles'};
    document.getElementById('clock-time').textContent =
      now.toLocaleTimeString('en-US',{...o,hour:'2-digit',minute:'2-digit'});
    document.getElementById('clock-date').textContent =
      now.toLocaleDateString('en-US',{...o,weekday:'short',month:'short',day:'numeric'});
  }
  tick(); setInterval(tick,1000);

  /* search filter */
  const input = document.getElementById('search');
  const noRes = document.getElementById('no-results');
  input.addEventListener('input', ()=>{
    const q = input.value.trim().toLowerCase();
    let anyVisible = false;
    document.querySelectorAll('[data-card]').forEach(card=>{
      const title = card.querySelector('h3').textContent.toLowerCase();
      let matchInCard = false;
      card.querySelectorAll('.card-links li').forEach(li=>{
        const hit = !q || li.textContent.toLowerCase().includes(q) || title.includes(q);
        li.style.display = hit ? '' : 'none';
        if(hit) matchInCard = true;
      });
      card.style.display = (matchInCard || !q) ? '' : 'none';
      if(card.style.display !== 'none') anyVisible = true;
    });
    noRes.classList.toggle('show', q && !anyVisible);
  });
})();
</script>
</body>
</html>
